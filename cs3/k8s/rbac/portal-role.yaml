apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: portal-operator
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: portal-operator-binding
  namespace: default
subjects:
- kind: User
  name: "portal-admin"
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: portal-operator
  apiGroup: rbac.authorization.k8s.io
