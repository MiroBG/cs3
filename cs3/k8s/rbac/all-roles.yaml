apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: cs3-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - services
  - endpoints
  - pods
  verbs: ["get", "list", "watch"]
- apiGroups: ["extensions"]
  resources:
  - ingresses
  verbs: ["get", "list", "watch"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: cs3-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluentd
  namespace: cs3-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluentd
rules:
- apiGroups: [""]
  resources:
  - pods
  - namespaces
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluentd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluentd
subjects:
- kind: ServiceAccount
  name: fluentd
  namespace: cs3-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cs3-portal
  namespace: cs3-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cs3-portal-role
  namespace: cs3-prod
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cs3-portal-rolebinding
  namespace: cs3-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cs3-portal-role
subjects:
- kind: ServiceAccount
  name: cs3-portal
  namespace: cs3-prod
