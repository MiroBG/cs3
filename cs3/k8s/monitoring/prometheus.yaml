apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: cs3-prod
  labels:
    app: prometheus
spec:
  ports:
  - name: prometheus
    port: 9090
    targetPort: 9090
  selector:
    app: prometheus
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cs3-prod
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
    - /etc/prometheus/alerts.yml
    scrape_configs:
    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
  alerts.yml: |
    groups:
    - name: cs3-portal
      rules:
      - alert: PortalTargetDown
        expr: up{app="cs3-portal"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Portal target is down"
          description: "Prometheus cannot scrape the cs3-portal pod for over 1 minute."
      - alert: PortalMetricsMissing
        expr: absent(cs3_portal_info)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Portal metrics missing"
          description: "cs3_portal_info has been absent for 5m; the portal is likely down or unscraped."
      - alert: PortalDatabaseDown
        expr: cs3_portal_database_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Portal cannot reach the database"
          description: "cs3_portal_database_up=0 for 2m. Check PostgreSQL on the EC2 host or run db-failover.sh."
      - alert: PortalHighErrorRate
        expr: |
          sum(rate(cs3_portal_http_requests_total{status=~"5.."}[5m]))
            / clamp_min(sum(rate(cs3_portal_http_requests_total[5m])), 1) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated 5xx error rate"
          description: "More than 10% of portal HTTP responses were 5xx over the last 5 minutes."
      - alert: PortalHighLatency
        expr: |
          sum(rate(cs3_portal_request_latency_seconds_sum[5m]))
            / clamp_min(sum(rate(cs3_portal_request_latency_seconds_count[5m])), 1) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High average request latency"
          description: "Average portal request latency exceeded 1s over the last 5 minutes."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: cs3-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--storage.tsdb.retention.time=7d'
          - '--web.enable-lifecycle'
        ports:
        - containerPort: 9090
          name: web
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: storage
          mountPath: /prometheus
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: storage
        emptyDir: {}
