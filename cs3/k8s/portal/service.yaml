apiVersion: v1
kind: Service
metadata:
  name: cs3-portal-svc
  namespace: cs3-prod
spec:
  selector:
    app: cs3-portal
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  # ClusterIP (not LoadBalancer): on single-node k3s the Traefik Ingress owns
  # host port 80. A LoadBalancer Service here makes klipper/ServiceLB fight
  # Traefik for :80, leaving the node unreachable. Access is via the Ingress.
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: portal-allow-ingress
  namespace: cs3-prod
spec:
  podSelector:
    matchLabels:
      app: cs3-portal
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 5000
  egress:
  - to:
    - ipBlock:
        cidr: 10.0.0.0/8
    - ipBlock:
        cidr: 172.16.0.0/12
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # HTTPS egress for the Cognito OAuth token exchange and the boto3 Cognito
  # admin API (provisioning). Cognito has no stable IPs, so this is 0.0.0.0/0:443.
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443
  # Instance Metadata Service: boto3 borrows the EC2 instance role from here to
  # sign Cognito admin calls. Only the portal pod is allowlisted to reach IMDS.
  - to:
    - ipBlock:
        cidr: 169.254.169.254/32
    ports:
    - protocol: TCP
      port: 80
