apiVersion: apps/v1
kind: Deployment
metadata:
  name: cs3-portal
  labels:
    app: cs3-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cs3-portal
  template:
    metadata:
      labels:
        app: cs3-portal
    spec:
      containers:
      - name: portal
        image: nginx:stable
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
