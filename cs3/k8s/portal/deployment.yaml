apiVersion: apps/v1
kind: Deployment
metadata:
  name: cs3-portal
  labels:
    app: cs3-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cs3-portal
  template:
    metadata:
      labels:
        app: cs3-portal
    spec:
      containers:
      - name: portal
        image: PORTAL_ECR_IMAGE:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: FLASK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: portal-secrets
              key: flask-secret-key
        - name: COGNITO_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: portal-secrets
              key: cognito-client-id
        - name: COGNITO_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: portal-secrets
              key: cognito-client-secret
        - name: COGNITO_DOMAIN
          valueFrom:
            configMapKeyRef:
              name: portal-config
              key: cognito-domain
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: portal-secrets
              key: db-host
        - name: DB_NAME
          value: employees
        - name: DB_USER
          value: admin
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: portal-secrets
              key: db-password
        - name: DB_PORT
          value: "5432"
        - name: PORTAL_URL
          valueFrom:
            configMapKeyRef:
              name: portal-config
              key: portal-url
        - name: AWS_REGION
          value: eu-central-1
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-config
data:
  cognito-domain: "COGNITO_DOMAIN_VALUE"
  portal-url: "https://portal.innovatech.local"
---
apiVersion: v1
kind: Secret
metadata:
  name: portal-secrets
type: Opaque
stringData:
  flask-secret-key: "FLASK_SECRET_KEY_VALUE"
  cognito-client-id: "COGNITO_CLIENT_ID_VALUE"
  cognito-client-secret: "COGNITO_CLIENT_SECRET_VALUE"
  db-host: "RDS_HOST_VALUE"
  db-password: "RDS_PASSWORD_VALUE"
