apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cs3-portal-ingress
  namespace: cs3-prod
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cs3-portal-svc
            port:
              number: 80
