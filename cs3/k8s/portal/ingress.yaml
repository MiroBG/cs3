apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cs3-portal-ingress
  namespace: cs3-prod
  annotations:
    # Serve both HTTP (80) and HTTPS (443). HTTPS is required because Cognito's
    # hosted-UI callback must use https://. With no secretName below, Traefik
    # serves its built-in self-signed certificate (browser shows a one-time
    # warning) — acceptable for an EIP-only lab with no DNS/cert.
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cs3-portal-svc
            port:
              number: 80
  tls:
  - {}
