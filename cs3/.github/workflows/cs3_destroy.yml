name: CS3 Destroy Pipeline

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  TF_IN_AUTOMATION: "true"

jobs:
  destroy:
    name: Terraform Destroy (cs3 manual)
    if: github.event.inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cs3/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_ARN || vars.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_ARN }}" || (echo "Missing role input: set AWS_ROLE_TO_ASSUME (or AWS_ROLE_ARN) in Secrets or Variables" && exit 1)
          test -n "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}" || (echo "Missing backend bucket: set TF_BACKEND_BUCKET in Secrets or Variables" && exit 1)
          test -n "${{ secrets.TF_STATE_KEY || vars.TF_STATE_KEY }}" || (echo "Missing state key: set TF_STATE_KEY in Secrets or Variables" && exit 1)

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_ARN || vars.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_ARN }}
          role-session-name: github-actions-cs3-destroy
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          STATE_KEY="${{ secrets.TF_STATE_KEY || vars.TF_STATE_KEY }}"
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}"
          key            = "${STATE_KEY}"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "terraform-locks"
          EOF

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: Set Terraform variable overrides
        run: |
          DB_PASSWORD="${{ secrets.CS3_DB_PASSWORD || vars.CS3_DB_PASSWORD }}"
          if [[ -n "$DB_PASSWORD" ]]; then
            echo "TF_VAR_db_password=$DB_PASSWORD" >> "$GITHUB_ENV"
          fi

          COGNITO_CALLBACK="${{ secrets.CS3_COGNITO_CALLBACK_URL || vars.CS3_COGNITO_CALLBACK_URL }}"
          if [[ -n "$COGNITO_CALLBACK" ]]; then
            echo "TF_VAR_cognito_callback_url=$COGNITO_CALLBACK" >> "$GITHUB_ENV"
          fi

      - name: Terraform destroy
        run: terraform destroy -auto-approve
        continue-on-error: true

      - name: Clean up orphaned resources
        run: |
          set +e  # Don't fail on individual cleanup steps
          
          echo "=== Cleaning up Cognito Domains ==="
          # Delete all Cognito user pool domains matching the pattern
          for domain in $(aws cognito-idp list-user-pool-domains --region ${{ env.AWS_REGION }} --query 'UserPoolDomains[].Domain' --output text 2>/dev/null); do
            if [[ "$domain" =~ ^cs3- ]]; then
              echo "Deleting Cognito domain: $domain"
              aws cognito-idp delete-user-pool-domain --domain "$domain" --region ${{ env.AWS_REGION }} 2>/dev/null && echo "✓ Deleted domain: $domain" || echo "✗ Failed to delete domain: $domain"
            fi
          done
          
          echo "=== Cleaning up IAM Roles ==="
          # Delete all IAM roles matching cs3 pattern
          for role in $(aws iam list-roles --query "Roles[?contains(RoleName, 'cs3-')].RoleName" --output text 2>/dev/null); do
            echo "Cleaning up IAM role: $role"
            # Detach all managed policies
            for policy_arn in $(aws iam list-attached-role-policies --role-name "$role" --query 'AttachedPolicies[].PolicyArn' --output text 2>/dev/null); do
              aws iam detach-role-policy --role-name "$role" --policy-arn "$policy_arn" 2>/dev/null && echo "  ✓ Detached policy: $policy_arn" || true
            done
            # Delete all inline policies
            for policy_name in $(aws iam list-role-policies --role-name "$role" --query 'PolicyNames[]' --output text 2>/dev/null); do
              aws iam delete-role-policy --role-name "$role" --policy-name "$policy_name" 2>/dev/null && echo "  ✓ Deleted inline policy: $policy_name" || true
            done
            # Delete the role
            aws iam delete-role --role-name "$role" 2>/dev/null && echo "✓ Deleted role: $role" || echo "✗ Failed to delete role: $role"
          done
          
          echo "=== Cleaning up ECR Repositories ==="
          # Delete all ECR repos matching cs3 pattern
          for repo in $(aws ecr describe-repositories --region ${{ env.AWS_REGION }} --query "repositories[?contains(repositoryName, 'cs3-')].repositoryName" --output text 2>/dev/null); do
            echo "Deleting ECR repository: $repo"
            aws ecr delete-repository --repository-name "$repo" --region ${{ env.AWS_REGION }} --force 2>/dev/null && echo "✓ Deleted repo: $repo" || echo "✗ Failed to delete repo: $repo"
          done
          
          echo "=== Cleaning up CloudWatch Log Groups ==="
          # Delete all CloudWatch log groups matching cs3 pattern
          for log_group in $(aws logs describe-log-groups --region ${{ env.AWS_REGION }} --query "logGroups[?contains(logGroupName, 'cs3-')].logGroupName" --output text 2>/dev/null); do
            echo "Deleting CloudWatch log group: $log_group"
            aws logs delete-log-group --log-group-name "$log_group" --region ${{ env.AWS_REGION }} 2>/dev/null && echo "✓ Deleted log group: $log_group" || echo "✗ Failed to delete log group: $log_group"
          done
          
          echo "=== Cleaning up remaining CloudWatch Log Groups with /aws paths ==="
          for log_group in $(aws logs describe-log-groups --region ${{ env.AWS_REGION }} --query "logGroups[?contains(logGroupName, '/aws/eks/cs3-')].logGroupName" --output text 2>/dev/null); do
            echo "Deleting log group: $log_group"
            aws logs delete-log-group --log-group-name "$log_group" --region ${{ env.AWS_REGION }} 2>/dev/null && echo "✓ Deleted log group: $log_group" || echo "✗ Failed to delete log group: $log_group"
          done

          echo "=== Cleaning up Network Interfaces (ENIs) ==="
          for eni in $(aws ec2 describe-network-interfaces --region ${{ env.AWS_REGION }} --query 'NetworkInterfaces[].NetworkInterfaceId' --output text 2>/dev/null); do
            name=$(aws ec2 describe-network-interfaces --network-interface-ids $eni --region ${{ env.AWS_REGION }} --query "NetworkInterfaces[0].TagSet[?Key=='Name'].Value | [0]" --output text 2>/dev/null || true)
            desc=$(aws ec2 describe-network-interfaces --network-interface-ids $eni --region ${{ env.AWS_REGION }} --query "NetworkInterfaces[0].Description" --output text 2>/dev/null || true)
            if [[ "$name" == cs3* || "$desc" == *cs3* ]]; then
              echo "Processing ENI: $eni (name=$name desc=$desc)"
              attach_id=$(aws ec2 describe-network-interfaces --network-interface-ids $eni --region ${{ env.AWS_REGION }} --query 'NetworkInterfaces[0].Attachment.AttachmentId' --output text 2>/dev/null || true)
              if [[ -n "$attach_id" && "$attach_id" != "None" ]]; then
                echo " Detaching attachment $attach_id"
                aws ec2 detach-network-interface --attachment-id "$attach_id" --region ${{ env.AWS_REGION }} 2>/dev/null || true
                sleep 2
              fi
              aws ec2 delete-network-interface --network-interface-id "$eni" --region ${{ env.AWS_REGION }} 2>/dev/null && echo "✓ Deleted ENI: $eni" || echo "✗ Failed to delete ENI: $eni"
            fi
          done
          
          echo "=== Cleanup completed ==="

  destroy_rejected:
    name: Destroy rejected (missing confirmation)
    if: github.event.inputs.confirm_destroy != 'DESTROY'
    runs-on: ubuntu-latest
    steps:
      - name: Fail if not confirmed
        run: |
          echo "Destroy not confirmed. Re-run workflow and set confirm_destroy to DESTROY."
          exit 1
