name: CS3 Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-central-1

jobs:
  check:
    name: Terraform Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "~> 1.0"

      - name: Terraform Format Check
        working-directory: cs3/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init (backend=false)
        working-directory: cs3/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: cs3/terraform
        run: terraform validate

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: check
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "~> 1.0"

      - name: Terraform Init
        working-directory: cs3/terraform
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=cs3/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=terraform-locks"

      - name: Terraform Plan
        working-directory: cs3/terraform
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          TF_LOG: DEBUG
          TF_VAR_resource_suffix: "v3"
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD || secrets.CS3_GRAFANA_ADMIN_PASSWORD }}
          TF_VAR_db_password: ${{ secrets.CS3_DB_PASSWORD }}
          TF_VAR_use_default_vpc: "true"
        run: terraform plan -input=false -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v3
        with:
          name: tfplan
          path: cs3/terraform/tfplan

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "~> 1.0"

      - name: Terraform Init
        working-directory: cs3/terraform
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=cs3/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=terraform-locks"

      - name: Terraform Apply
        working-directory: cs3/terraform
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          TF_VAR_resource_suffix: "v3"
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          TF_VAR_db_password: ${{ secrets.CS3_DB_PASSWORD }}
          TF_VAR_use_default_vpc: "true"
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs
        working-directory: cs3/terraform
        id: tf_output
        run: |
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "eks_cluster_name=$(terraform output -raw eks_cluster_name)" >> $GITHUB_OUTPUT
          echo "cognito_client_id=$(terraform output -raw cognito_client_id)" >> $GITHUB_OUTPUT
          echo "cognito_domain=$(terraform output -raw cognito_domain)" >> $GITHUB_OUTPUT
          echo "rds_endpoint=$(terraform output -raw rds_endpoint | cut -d: -f1)" >> $GITHUB_OUTPUT

  build-and-push-image:
    name: Build and Push Portal Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: apply
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR Repository URL
        id: ecr
        run: |
          ECR_REPO=$(aws ecr describe-repositories --repository-names cs3-portal --region ${{ env.AWS_REGION }} --query 'repositories[0].repositoryUri' --output text 2>/dev/null || echo "")
          if [ -z "$ECR_REPO" ]; then
              echo "ECR repository not found, will be created by Terraform"
              exit 1
          fi
          echo "repository_url=$ECR_REPO" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: cs3-portal
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd cs3/portal
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  database-init:
    name: Initialize Database
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: apply
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get RDS Endpoint
        id: rds
        working-directory: cs3/terraform
        run: |
          terraform init -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" -backend-config="key=cs3/terraform.tfstate" -backend-config="region=${{ env.AWS_REGION }}" -backend-config="dynamodb_table=terraform-locks" -backend=false
          echo "endpoint=$(terraform output -raw rds_endpoint | cut -d: -f1)" >> $GITHUB_OUTPUT

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Initialize Database Schema
        env:
          PGHOST: ${{ steps.rds.outputs.endpoint }}
          PGDATABASE: employees
          PGUSER: admin
          PGPASSWORD: ${{ secrets.CS3_DB_PASSWORD }}
        run: |
          psql -f cs3/terraform/rds/schema.sql

  deploy-portal:
    name: Deploy Portal to Kubernetes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-and-push-image, database-init]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "~> 1.0"

      - name: Get Terraform Outputs
        working-directory: cs3/terraform
        id: tf_output
        run: |
          terraform init -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" -backend-config="key=cs3/terraform.tfstate" -backend-config="region=${{ env.AWS_REGION }}" -backend-config="dynamodb_table=terraform-locks"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "eks_cluster_name=$(terraform output -raw eks_cluster_name)" >> $GITHUB_OUTPUT
          echo "cognito_client_id=$(terraform output -raw cognito_client_id)" >> $GITHUB_OUTPUT
          echo "cognito_client_secret=$(terraform output -raw cognito_client_secret)" >> $GITHUB_OUTPUT
          echo "cognito_domain=$(terraform output -raw cognito_domain)" >> $GITHUB_OUTPUT
          echo "rds_endpoint=$(terraform output -raw rds_endpoint | cut -d: -f1)" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ steps.tf_output.outputs.eks_cluster_name }}

      - name: Deploy Portal to Kubernetes
        env:
          ECR_IMAGE: ${{ steps.tf_output.outputs.ecr_repository_url }}:latest
          COGNITO_CLIENT_ID: ${{ steps.tf_output.outputs.cognito_client_id }}
          COGNITO_CLIENT_SECRET: ${{ steps.tf_output.outputs.cognito_client_secret }}
          COGNITO_DOMAIN: ${{ steps.tf_output.outputs.cognito_domain }}
          RDS_HOST: ${{ steps.tf_output.outputs.rds_endpoint }}
          DB_PASSWORD: ${{ secrets.CS3_DB_PASSWORD }}
        run: |
          cd cs3
          bash scripts/deploy-portal.sh "$ECR_IMAGE" "$COGNITO_CLIENT_ID" "$COGNITO_CLIENT_SECRET" "$COGNITO_DOMAIN" "$RDS_HOST" "$DB_PASSWORD"

      - name: Verify Portal Deployment
        run: |
          kubectl rollout status deployment/cs3-portal --timeout=5m
          kubectl get pods,svc
