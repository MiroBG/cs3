name: CS3 Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tfsec:
    name: Terraform Security Scan (tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tfsec
        run: |
          curl -sSLf https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
      - name: Run tfsec
        working-directory: cs3/terraform
        run: tfsec .

  trivy:
    name: Container Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [tfsec]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build portal image
        working-directory: cs3/portal
        run: |
          docker build -t cs3-portal:scan .
      - name: Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy
      - name: Scan image
        run: |
          trivy image --severity HIGH,CRITICAL --no-progress cs3-portal:scan || true

  kube-bench:
    name: Kubernetes Bench (kube-bench)
    runs-on: ubuntu-latest
    needs: [tfsec]
    steps:
      - uses: actions/checkout@v4
      - name: Run kube-bench (Docker)
        run: |
          docker run --rm aquasec/kube-bench:latest --version 1.20 || true

  report:
    name: Upload security scan reports
    runs-on: ubuntu-latest
    needs: [trivy, kube-bench]
    steps:
      - name: Create report placeholder
        run: echo "Security scans completed" > report.txt
      - name: Upload report
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: report.txt
