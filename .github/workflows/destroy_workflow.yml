name: destroy_workflow

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  TF_IN_AUTOMATION: "true"

jobs:
  destroy_cs3:
    name: Terraform Destroy (CS3)
    if: github.event.inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cs3/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}" || (echo "Missing AWS_ROLE_TO_ASSUME" && exit 1)
          test -n "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}" || (echo "Missing TF_BACKEND_BUCKET" && exit 1)
          test -n "${{ secrets.CS3_DB_PASSWORD || vars.CS3_DB_PASSWORD }}" || (echo "Missing CS3_DB_PASSWORD" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-cs3-destroy
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}"
          key            = "cs3/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "terraform-locks"
          EOF

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: Set Terraform variable overrides
        env:
          DB_PASSWORD: "${{ secrets.CS3_DB_PASSWORD || vars.CS3_DB_PASSWORD }}"
          GRAFANA_PASSWORD: "${{ secrets.GRAFANA_ADMIN_PASSWORD || vars.GRAFANA_ADMIN_PASSWORD }}"
        run: |
          if [[ -n "$DB_PASSWORD" ]]; then
            echo "TF_VAR_db_password=$DB_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "Missing CS3_DB_PASSWORD"
            exit 1
          fi
          if [[ -n "$GRAFANA_PASSWORD" ]]; then
            echo "TF_VAR_grafana_admin_password=$GRAFANA_PASSWORD" >> "$GITHUB_ENV"
          fi
          echo "TF_VAR_enable_logging=false" >> "$GITHUB_ENV"

      - name: Remove Helm releases from logging namespace (if reachable)
        continue-on-error: true
        run: |
          set +e
          # Try to retrieve kubeconfig from EC2 if logging was enabled
          if [[ -d ".generated/k3s" && -f ".generated/k3s/kubeconfig.yaml" ]]; then
            export KUBECONFIG=".generated/k3s/kubeconfig.yaml"
            helm list --namespace logging && helm delete -n logging loki 2>/dev/null || true
            helm list --namespace monitoring && helm delete -n monitoring prometheus 2>/dev/null || true
          fi
          set -e

      - name: Terraform destroy (CS3)
        run: terraform destroy -auto-approve
        continue-on-error: true

  destroy_main:
    name: Terraform Destroy (Main/CS1-2)
    if: github.event.inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest
    needs: destroy_cs3
    defaults:
      run:
        working-directory: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_ARN || vars.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_ARN }}" || (echo "Missing role input: set AWS_ROLE_TO_ASSUME (or AWS_ROLE_ARN) in Secrets or Variables" && exit 1)
          test -n "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}" || (echo "Missing backend bucket: set TF_BACKEND_BUCKET in Secrets or Variables" && exit 1)
          test -n "${{ secrets.TF_STATE_KEY || vars.TF_STATE_KEY }}" || (echo "Missing state key: set TF_STATE_KEY in Secrets or Variables" && exit 1)

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_ARN || vars.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_ARN }}
          role-session-name: github-actions-destroy-main
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          STATE_KEY="${{ secrets.TF_STATE_KEY || vars.TF_STATE_KEY }}"
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}"
          key            = "${STATE_KEY}"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          use_lockfile   = true
          EOF

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: Set Terraform variable overrides
        run: |
          DB_PASSWORD="${{ secrets.CS3_DB_PASSWORD || vars.CS3_DB_PASSWORD }}"
          ADMIN_CIDR="${{ secrets.ADMIN_INGRESS_CIDR || vars.ADMIN_INGRESS_CIDR }}"
          GRAFANA_USER="${{ secrets.GRAFANA_ADMIN_USER || vars.GRAFANA_ADMIN_USER }}"
          GRAFANA_PASS="${{ secrets.GRAFANA_ADMIN_PASSWORD || vars.GRAFANA_ADMIN_PASSWORD }}"
          PG_EXPORTER_USER="${{ secrets.POSTGRES_EXPORTER_USER || vars.POSTGRES_EXPORTER_USER }}"
          PG_EXPORTER_PASS="${{ secrets.POSTGRES_EXPORTER_PASSWORD || vars.POSTGRES_EXPORTER_PASSWORD }}"
          SOAR_ALERT_EMAIL="${{ secrets.SOAR_ALERT_EMAIL || vars.SOAR_ALERT_EMAIL }}"
          SOAR_ENABLE_SCHEDULED_TEST="${{ secrets.SOAR_ENABLE_SCHEDULED_TEST_EVENT || vars.SOAR_ENABLE_SCHEDULED_TEST_EVENT }}"
          SOAR_ENABLE_SHUTDOWN="${{ secrets.SOAR_ENABLE_INSTANCE_SHUTDOWN || vars.SOAR_ENABLE_INSTANCE_SHUTDOWN }}"

          if [[ -n "$ADMIN_CIDR" ]]; then
            echo "TF_VAR_ssh_ingress_cidr=$ADMIN_CIDR" >> "$GITHUB_ENV"
          fi
          if [[ -n "$DB_PASSWORD" ]]; then
            echo "TF_VAR_db_password=$DB_PASSWORD" >> "$GITHUB_ENV"
          fi
          if [[ -n "$GRAFANA_USER" ]]; then
            echo "TF_VAR_grafana_admin_user=$GRAFANA_USER" >> "$GITHUB_ENV"
          fi
          if [[ -n "$GRAFANA_PASS" ]]; then
            echo "TF_VAR_grafana_admin_password=$GRAFANA_PASS" >> "$GITHUB_ENV"
          fi
          if [[ -n "$PG_EXPORTER_USER" ]]; then
            echo "TF_VAR_postgres_exporter_user=$PG_EXPORTER_USER" >> "$GITHUB_ENV"
          fi
          if [[ -n "$PG_EXPORTER_PASS" ]]; then
            echo "TF_VAR_postgres_exporter_password=$PG_EXPORTER_PASS" >> "$GITHUB_ENV"
          fi
          if [[ -n "$SOAR_ALERT_EMAIL" ]]; then
            echo "TF_VAR_soar_alert_email=$SOAR_ALERT_EMAIL" >> "$GITHUB_ENV"
          fi
          if [[ -n "$SOAR_ENABLE_SCHEDULED_TEST" ]]; then
            echo "TF_VAR_soar_enable_scheduled_test_event=$SOAR_ENABLE_SCHEDULED_TEST" >> "$GITHUB_ENV"
          fi
          if [[ -n "$SOAR_ENABLE_SHUTDOWN" ]]; then
            echo "TF_VAR_soar_enable_instance_shutdown=$SOAR_ENABLE_SHUTDOWN" >> "$GITHUB_ENV"
          fi

      - name: Terraform destroy (Main/CS1-2)
        run: terraform destroy -auto-approve
        continue-on-error: true

  destroy_bootstrap:
    name: Terraform Destroy (Bootstrap)
    if: github.event.inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest
    needs: destroy_main
    defaults:
      run:
        working-directory: bootstrap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}" || (echo "Missing AWS_ROLE_TO_ASSUME" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-bootstrap-destroy
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init (local backend)
        run: terraform init -backend=false

      - name: Terraform destroy (Bootstrap)
        run: terraform destroy -auto-approve
        continue-on-error: true

  cleanup_orphaned:
    name: Cleanup Orphaned Resources
    if: github.event.inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest
    needs: [destroy_cs3, destroy_main, destroy_bootstrap]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-cleanup
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean up orphaned resources (comprehensive)
        run: |
          set +e  # Don't fail on individual cleanup steps
          
          echo "=========================================="
          echo "COMPREHENSIVE CLEANUP PHASE"
          echo "=========================================="
          
          REGION="${{ env.AWS_REGION }}"
          PATTERNS=("cs1" "cs2" "cs3" "bootstrap")
          
          echo ""
          echo "=== Step 1: Detach and Delete Internet Gateways ==="
          for igw_id in $(aws ec2 describe-internet-gateways --region "$REGION" --query 'InternetGateways[].InternetGatewayId' --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              igw_name=$(aws ec2 describe-internet-gateways --internet-gateway-ids "$igw_id" --region "$REGION" --query 'InternetGateways[0].Tags[?Key==`Name`].Value' --output text 2>/dev/null || true)
              if [[ "$igw_name" =~ $pattern ]] || [[ -z "$igw_name" ]]; then
                # Detach from VPC
                for vpc_id in $(aws ec2 describe-internet-gateways --internet-gateway-ids "$igw_id" --region "$REGION" --query 'InternetGateways[0].Attachments[].VpcId' --output text 2>/dev/null); do
                  echo "Detaching IGW $igw_id from VPC $vpc_id"
                  aws ec2 detach-internet-gateway --internet-gateway-id "$igw_id" --vpc-id "$vpc_id" --region "$REGION" 2>/dev/null && echo "  ✓ Detached" || echo "  ✗ Failed"
                done
                # Delete IGW
                echo "Deleting Internet Gateway: $igw_id"
                aws ec2 delete-internet-gateway --internet-gateway-id "$igw_id" --region "$REGION" 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Step 2: Release Elastic IPs ==="
          for alloc_id in $(aws ec2 describe-addresses --region "$REGION" --query 'Addresses[].AllocationId' --output text 2>/dev/null); do
            public_ip=$(aws ec2 describe-addresses --allocation-ids "$alloc_id" --region "$REGION" --query 'Addresses[0].PublicIp' --output text 2>/dev/null || true)
            echo "Releasing EIP: $public_ip"
            aws ec2 release-address --allocation-id "$alloc_id" --region "$REGION" 2>/dev/null && echo "  ✓ Released" || echo "  ✗ Failed"
          done
          
          echo ""
          echo "=== Step 3: Detach and Delete NAT Gateways ==="
          for ngw_id in $(aws ec2 describe-nat-gateways --region "$REGION" --filter Name=state,Values=available --query 'NatGateways[].NatGatewayId' --output text 2>/dev/null); do
            echo "Deleting NAT Gateway: $ngw_id"
            aws ec2 delete-nat-gateway --nat-gateway-id "$ngw_id" --region "$REGION" 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
          done
          
          # Wait for NAT gateways to be deleted
          sleep 10
          
          echo ""
          echo "=== Step 4: Delete Security Groups ==="
          for sg_id in $(aws ec2 describe-security-groups --region "$REGION" --query 'SecurityGroups[].GroupId' --output text 2>/dev/null); do
            sg_name=$(aws ec2 describe-security-groups --group-ids "$sg_id" --region "$REGION" --query 'SecurityGroups[0].GroupName' --output text 2>/dev/null || true)
            if [[ "$sg_name" != "default" ]]; then
              for pattern in "${PATTERNS[@]}"; do
                if [[ "$sg_name" =~ $pattern ]]; then
                  echo "Deleting Security Group: $sg_name ($sg_id)"
                  aws ec2 delete-security-group --group-id "$sg_id" --region "$REGION" 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed (may still be in use)"
                  break
                fi
              done
            fi
          done
          
          echo ""
          echo "=== Step 5: Delete Subnets ==="
          for subnet_id in $(aws ec2 describe-subnets --region "$REGION" --query 'Subnets[].SubnetId' --output text 2>/dev/null); do
            subnet_tags=$(aws ec2 describe-subnets --subnet-ids "$subnet_id" --region "$REGION" --query 'Subnets[0].Tags' --output json 2>/dev/null || true)
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$subnet_tags" =~ $pattern ]]; then
                echo "Deleting Subnet: $subnet_id"
                aws ec2 delete-subnet --subnet-id "$subnet_id" --region "$REGION" 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed (may still be in use)"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Step 6: Delete Route Tables ==="
          for rtb_id in $(aws ec2 describe-route-tables --region "$REGION" --query 'RouteTables[].RouteTableId' --output text 2>/dev/null); do
            is_main=$(aws ec2 describe-route-tables --route-table-ids "$rtb_id" --region "$REGION" --query 'RouteTables[0].Associations[0].Main' --output text 2>/dev/null || true)
            if [[ "$is_main" != "True" ]]; then
              rtb_tags=$(aws ec2 describe-route-tables --route-table-ids "$rtb_id" --region "$REGION" --query 'RouteTables[0].Tags' --output json 2>/dev/null || true)
              for pattern in "${PATTERNS[@]}"; do
                if [[ "$rtb_tags" =~ $pattern ]]; then
                  echo "Deleting Route Table: $rtb_id"
                  aws ec2 delete-route-table --route-table-id "$rtb_id" --region "$REGION" 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                  break
                fi
              done
            fi
          done
          
          echo ""
          echo "=== Step 7: Delete VPCs ==="
          for vpc_id in $(aws ec2 describe-vpcs --region "$REGION" --query 'Vpcs[].VpcId' --output text 2>/dev/null); do
            is_default=$(aws ec2 describe-vpcs --vpc-ids "$vpc_id" --region "$REGION" --query 'Vpcs[0].IsDefault' --output text 2>/dev/null || true)
            if [[ "$is_default" != "True" ]]; then
              vpc_tags=$(aws ec2 describe-vpcs --vpc-ids "$vpc_id" --region "$REGION" --query 'Vpcs[0].Tags' --output json 2>/dev/null || true)
              for pattern in "${PATTERNS[@]}"; do
                if [[ "$vpc_tags" =~ $pattern ]]; then
                  echo "Deleting VPC: $vpc_id"
                  aws ec2 delete-vpc --vpc-id "$vpc_id" --region "$REGION" 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed (may have dependencies)"
                  break
                fi
              done
            fi
          done
          
          # Continue with remaining resource types
          echo ""
          echo "=== Step 8: Cleaning up Lambda Functions ==="
          for func in $(aws lambda list-functions --region $REGION --query 'Functions[].FunctionName' --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$func" =~ $pattern ]]; then
                echo "Deleting Lambda function: $func"
                aws lambda delete-function --function-name "$func" --region $REGION 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Step 9: Cleaning up SNS Topics ==="
          for topic_arn in $(aws sns list-topics --region $REGION --query 'Topics[].TopicArn' --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$topic_arn" =~ $pattern ]]; then
                echo "Deleting SNS topic: $topic_arn"
                aws sns delete-topic --topic-arn "$topic_arn" --region $REGION 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Step 10: Cleaning up DynamoDB Tables ==="
          for table in $(aws dynamodb list-tables --region $REGION --query 'TableNames[]' --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$table" =~ $pattern ]] || [[ "$table" == "terraform-locks" ]]; then
                echo "Deleting DynamoDB table: $table"
                aws dynamodb delete-table --table-name "$table" --region $REGION 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Step 11: Cleaning up Cognito Resources ==="
          # User pools
          for pool_id in $(aws cognito-idp list-user-pools --max-results 60 --region $REGION --query 'UserPools[].Id' --output text 2>/dev/null); do
            pool_name=$(aws cognito-idp describe-user-pool --user-pool-id "$pool_id" --region $REGION --query 'UserPool.Name' --output text 2>/dev/null || true)
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$pool_name" =~ $pattern ]]; then
                echo "Deleting Cognito User Pool: $pool_name ($pool_id)"
                aws cognito-idp delete-user-pool --user-pool-id "$pool_id" --region $REGION 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          # Identity pools
          for pool_id in $(aws cognito-identity list-identity-pools --max-results 60 --region $REGION --query 'IdentityPools[].IdentityPoolId' --output text 2>/dev/null); do
            pool_name=$(aws cognito-identity describe-identity-pool --identity-pool-id "$pool_id" --region $REGION --query 'IdentityPoolName' --output text 2>/dev/null || true)
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$pool_name" =~ $pattern ]]; then
                echo "Deleting Cognito Identity Pool: $pool_name ($pool_id)"
                aws cognito-identity delete-identity-pool --identity-pool-id "$pool_id" --region $REGION 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Step 12: Cleaning up ECR Repositories ==="
          for repo in $(aws ecr describe-repositories --region $REGION --query 'repositories[].repositoryName' --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$repo" =~ $pattern ]]; then
                echo "Deleting ECR repository: $repo"
                aws ecr delete-repository --repository-name "$repo" --region $REGION --force 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Step 13: Cleaning up CloudWatch Log Groups ==="
          for log_group in $(aws logs describe-log-groups --region $REGION --query 'logGroups[].logGroupName' --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$log_group" =~ $pattern ]] || [[ "$log_group" =~ /aws/lambda/ ]] || [[ "$log_group" =~ /aws/eks/ ]]; then
                echo "Deleting log group: $log_group"
                aws logs delete-log-group --log-group-name "$log_group" --region $REGION 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Step 14: Cleaning up S3 Buckets ==="
          for bucket in $(aws s3 ls --query "Buckets[].Name" --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$bucket" =~ $pattern ]]; then
                echo "Emptying and deleting S3 bucket: $bucket"
                aws s3 rm "s3://$bucket" --recursive 2>/dev/null && echo "  ✓ Emptied" || true
                aws s3 rb "s3://$bucket" 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=========================================="
          echo "✓ Comprehensive Cleanup Phase Complete"
          echo "=========================================="
          
          echo ""
          echo "=== Cleaning up Cognito Resources ==="
          # User pools
          for pool_id in $(aws cognito-idp list-user-pools --max-results 60 --region ${{ env.AWS_REGION }} --query 'UserPools[].Id' --output text 2>/dev/null); do
            pool_name=$(aws cognito-idp describe-user-pool --user-pool-id "$pool_id" --region ${{ env.AWS_REGION }} --query 'UserPool.Name' --output text 2>/dev/null || true)
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$pool_name" =~ $pattern ]]; then
                echo "Deleting Cognito User Pool: $pool_name ($pool_id)"
                aws cognito-idp delete-user-pool --user-pool-id "$pool_id" --region ${{ env.AWS_REGION }} 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          # Identity pools
          for pool_id in $(aws cognito-identity list-identity-pools --max-results 60 --region ${{ env.AWS_REGION }} --query 'IdentityPools[].IdentityPoolId' --output text 2>/dev/null); do
            pool_name=$(aws cognito-identity describe-identity-pool --identity-pool-id "$pool_id" --region ${{ env.AWS_REGION }} --query 'IdentityPoolName' --output text 2>/dev/null || true)
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$pool_name" =~ $pattern ]]; then
                echo "Deleting Cognito Identity Pool: $pool_name ($pool_id)"
                aws cognito-identity delete-identity-pool --identity-pool-id "$pool_id" --region ${{ env.AWS_REGION }} 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          # Cognito domains
          for domain in $(aws cognito-idp list-user-pool-domains --region ${{ env.AWS_REGION }} --query 'UserPoolDomains[].Domain' --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$domain" =~ $pattern ]]; then
                echo "Deleting Cognito domain: $domain"
                aws cognito-idp delete-user-pool-domain --domain "$domain" --region ${{ env.AWS_REGION }} 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Cleaning up IAM Roles & Policies ==="
          for role in $(aws iam list-roles --query "Roles[].RoleName" --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$role" =~ $pattern ]]; then
                echo "Cleaning up IAM role: $role"
                # Detach managed policies
                for policy_arn in $(aws iam list-attached-role-policies --role-name "$role" --query 'AttachedPolicies[].PolicyArn' --output text 2>/dev/null); do
                  aws iam detach-role-policy --role-name "$role" --policy-arn "$policy_arn" 2>/dev/null && echo "  ✓ Detached policy" || true
                done
                # Delete inline policies
                for policy_name in $(aws iam list-role-policies --role-name "$role" --query 'PolicyNames[]' --output text 2>/dev/null); do
                  aws iam delete-role-policy --role-name "$role" --policy-name "$policy_name" 2>/dev/null && echo "  ✓ Deleted inline policy" || true
                done
                # Delete role
                aws iam delete-role --role-name "$role" 2>/dev/null && echo "  ✓ Deleted role" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Cleaning up RDS Instances ==="
          for db_instance in $(aws rds describe-db-instances --region ${{ env.AWS_REGION }} --query 'DBInstances[].DBInstanceIdentifier' --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$db_instance" =~ $pattern ]]; then
                echo "Deleting RDS instance: $db_instance"
                aws rds delete-db-instance --db-instance-identifier "$db_instance" --skip-final-snapshot --region ${{ env.AWS_REGION }} 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Cleaning up ECR Repositories ==="
          for repo in $(aws ecr describe-repositories --region ${{ env.AWS_REGION }} --query 'repositories[].repositoryName' --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$repo" =~ $pattern ]]; then
                echo "Deleting ECR repository: $repo"
                aws ecr delete-repository --repository-name "$repo" --region ${{ env.AWS_REGION }} --force 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Cleaning up CloudWatch Log Groups ==="
          for log_group in $(aws logs describe-log-groups --region ${{ env.AWS_REGION }} --query 'logGroups[].logGroupName' --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$log_group" =~ $pattern ]] || [[ "$log_group" =~ /aws/lambda/ ]] || [[ "$log_group" =~ /aws/eks/ ]]; then
                echo "Deleting log group: $log_group"
                aws logs delete-log-group --log-group-name "$log_group" --region ${{ env.AWS_REGION }} 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Cleaning up Load Balancers & Target Groups ==="
          # ALBs
          for alb_arn in $(aws elbv2 describe-load-balancers --region ${{ env.AWS_REGION }} --query 'LoadBalancers[].LoadBalancerArn' --output text 2>/dev/null); do
            alb_name=$(echo "$alb_arn" | awk -F':' '{print $NF}')
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$alb_name" =~ $pattern ]]; then
                echo "Deleting ALB: $alb_name"
                aws elbv2 delete-load-balancer --load-balancer-arn "$alb_arn" --region ${{ env.AWS_REGION }} 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Cleaning up S3 Buckets ==="
          for bucket in $(aws s3 ls --query "Buckets[].Name" --output text 2>/dev/null); do
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$bucket" =~ $pattern ]]; then
                echo "Emptying and deleting S3 bucket: $bucket"
                aws s3 rm "s3://$bucket" --recursive 2>/dev/null && echo "  ✓ Emptied" || true
                aws s3 rb "s3://$bucket" 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                break
              fi
            done
          done
          
          echo ""
          echo "=== Cleaning up WAFv2 WebACLs ==="
          for acl_arn in $(aws wafv2 list-web-acls --scope REGIONAL --region ${{ env.AWS_REGION }} --query 'WebACLs[].ARN' --output text 2>/dev/null); do
            acl_name=$(echo "$acl_arn" | awk -F'/' '{print $4}')
            for pattern in "${PATTERNS[@]}"; do
              if [[ "$acl_name" =~ $pattern ]]; then
                echo "Deleting WAFv2 WebACL: $acl_name"
                acl_id=$(echo "$acl_arn" | awk -F'/' '{print $3}')
                acl_version=$(aws wafv2 get-web-acl --scope REGIONAL --id "$acl_id" --name "$acl_name" --region ${{ env.AWS_REGION }} --query 'WebACL.LockToken' --output text 2>/dev/null || true)
                if [[ -n "$acl_version" && "$acl_version" != "None" ]]; then
                  aws wafv2 delete-web-acl --scope REGIONAL --id "$acl_id" --name "$acl_name" --lock-token "$acl_version" --region ${{ env.AWS_REGION }} 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
                fi
                break
              fi
            done
          done
          
          echo ""
          echo "=========================================="
          echo "✓ Cleanup Phase Complete"
          echo "=========================================="

  destroy_rejected:
    name: Destroy rejected (missing confirmation)
    if: github.event.inputs.confirm_destroy != 'DESTROY'
    runs-on: ubuntu-latest
    steps:
      - name: Fail if not confirmed
        run: |
          echo "Destroy not confirmed. Re-run workflow and set confirm_destroy to DESTROY."
          exit 1
