name: deploy_workflow

on:
  pull_request:
    paths:
      - "main/**"
      - "terraform/**"
      - "bootstrap/**"
      - ".github/workflows/deploy_workflow.yml"
    paths-ignore:
      - "cs3/**"
  push:
    branches:
      - main
    paths:
      - "main/**"
      - "terraform/**"
      - "bootstrap/**"
      - ".github/workflows/deploy_workflow.yml"
    paths-ignore:
      - "cs3/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-main
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  TF_IN_AUTOMATION: "true"

jobs:
  check:
    name: Fmt + Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt (check)
        run: terraform fmt -recursive -check

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  apply:
    name: Plan + Apply (main)
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required backend secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_ARN || vars.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_ARN }}" || (echo "Missing role input: set AWS_ROLE_TO_ASSUME (or AWS_ROLE_ARN) in Secrets or Variables" && exit 1)
          test -n "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}" || (echo "Missing backend bucket: set TF_BACKEND_BUCKET in Secrets or Variables" && exit 1)
          test -n "${{ secrets.TF_STATE_KEY || vars.TF_STATE_KEY }}" || (echo "Missing state key: set TF_STATE_KEY in Secrets or Variables" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_ARN || vars.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          STATE_KEY="${{ secrets.TF_STATE_KEY || vars.TF_STATE_KEY }}"
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}"
          key            = "${STATE_KEY}"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          use_lockfile   = true
          EOF

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: Set Terraform variable overrides
        run: |
          ADMIN_CIDR="${{ secrets.ADMIN_INGRESS_CIDR || vars.ADMIN_INGRESS_CIDR }}"
          GRAFANA_USER="${{ secrets.GRAFANA_ADMIN_USER || vars.GRAFANA_ADMIN_USER }}"
          GRAFANA_PASS="${{ secrets.GRAFANA_ADMIN_PASSWORD || vars.GRAFANA_ADMIN_PASSWORD }}"
          PG_EXPORTER_USER="${{ secrets.POSTGRES_EXPORTER_USER || vars.POSTGRES_EXPORTER_USER }}"
          PG_EXPORTER_PASS="${{ secrets.POSTGRES_EXPORTER_PASSWORD || vars.POSTGRES_EXPORTER_PASSWORD }}"
          SOAR_ALERT_EMAIL="${{ secrets.SOAR_ALERT_EMAIL || vars.SOAR_ALERT_EMAIL }}"
          SOAR_ENABLE_SCHEDULED_TEST="${{ secrets.SOAR_ENABLE_SCHEDULED_TEST_EVENT || vars.SOAR_ENABLE_SCHEDULED_TEST_EVENT }}"
          SOAR_ENABLE_SHUTDOWN="${{ secrets.SOAR_ENABLE_INSTANCE_SHUTDOWN || vars.SOAR_ENABLE_INSTANCE_SHUTDOWN }}"

          if [[ -n "$ADMIN_CIDR" ]]; then
            echo "TF_VAR_ssh_ingress_cidr=$ADMIN_CIDR" >> "$GITHUB_ENV"
            echo "Using ADMIN_INGRESS_CIDR from GitHub Secrets/Variables"
          else
            echo "ADMIN_INGRESS_CIDR not set; Terraform default for ssh_ingress_cidr will be used"
          fi

          if [[ -n "$GRAFANA_USER" ]]; then
            echo "TF_VAR_grafana_admin_user=$GRAFANA_USER" >> "$GITHUB_ENV"
            echo "Using GRAFANA_ADMIN_USER from GitHub Secrets/Variables"
          fi

          if [[ -n "$GRAFANA_PASS" ]]; then
            echo "TF_VAR_grafana_admin_password=$GRAFANA_PASS" >> "$GITHUB_ENV"
            echo "Using GRAFANA_ADMIN_PASSWORD from GitHub Secrets/Variables"
          fi

          if [[ -n "$PG_EXPORTER_USER" ]]; then
            echo "TF_VAR_postgres_exporter_user=$PG_EXPORTER_USER" >> "$GITHUB_ENV"
            echo "Using POSTGRES_EXPORTER_USER from GitHub Secrets/Variables"
          fi

          if [[ -n "$PG_EXPORTER_PASS" ]]; then
            echo "TF_VAR_postgres_exporter_password=$PG_EXPORTER_PASS" >> "$GITHUB_ENV"
            echo "Using POSTGRES_EXPORTER_PASSWORD from GitHub Secrets/Variables"
          fi

          if [[ -n "$SOAR_ALERT_EMAIL" ]]; then
            echo "TF_VAR_soar_alert_email=$SOAR_ALERT_EMAIL" >> "$GITHUB_ENV"
            echo "Using SOAR_ALERT_EMAIL from GitHub Secrets/Variables"
          fi

          if [[ -n "$SOAR_ENABLE_SCHEDULED_TEST" ]]; then
            echo "TF_VAR_soar_enable_scheduled_test_event=$SOAR_ENABLE_SCHEDULED_TEST" >> "$GITHUB_ENV"
            echo "Using SOAR_ENABLE_SCHEDULED_TEST_EVENT from GitHub Secrets/Variables"
          fi

          if [[ -n "$SOAR_ENABLE_SHUTDOWN" ]]; then
            echo "TF_VAR_soar_enable_instance_shutdown=$SOAR_ENABLE_SHUTDOWN" >> "$GITHUB_ENV"
            echo "Using SOAR_ENABLE_INSTANCE_SHUTDOWN from GitHub Secrets/Variables"
          fi

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
