name: CS3 Deployment Pipeline

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-cs3
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  TF_IN_AUTOMATION: "true"

jobs:
  check:
    name: Fmt + Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cs3/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt (check)
        run: terraform fmt -recursive -check

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: cs3/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}" || (echo "Missing AWS_ROLE_TO_ASSUME" && exit 1)
          test -n "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}" || (echo "Missing TF_BACKEND_BUCKET" && exit 1)
          test -n "${{ secrets.CS3_DB_PASSWORD || vars.CS3_DB_PASSWORD }}" || (echo "Missing CS3_DB_PASSWORD" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-cs3-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}"
          key            = "cs3/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "terraform-locks"
          EOF

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: Auto-import existing AWS resources
        run: |
          set -euo pipefail
          export ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          NAME_PREFIX="${TF_VAR_name_prefix:-cs3}"
          RESOURCE_SUFFIX="${TF_VAR_resource_suffix:-v6}"
          CLUSTER_NAME="${TF_VAR_cluster_name:-cs3-eks-cluster}"
          DB_NAME="${NAME_PREFIX}-employee-db-${RESOURCE_SUFFIX}"
          ECR_REPO_NAME="${NAME_PREFIX}-portal-${RESOURCE_SUFFIX}"
          LOG_GROUP_NAME="/aws/eks/${CLUSTER_NAME}-${RESOURCE_SUFFIX}/portal"
          EKS_CLUSTER_SG_NAME="${CLUSTER_NAME}-${RESOURCE_SUFFIX}-cluster-sg"
          RDS_SG_NAME="${DB_NAME}-sg"
          RDS_SUBNET_GROUP_NAME="${DB_NAME}-subnet-group"
          WAF_NAME="${NAME_PREFIX}-portal-waf-${RESOURCE_SUFFIX}"
          COGNITO_ROLE_NAME="${NAME_PREFIX}-employees-${RESOURCE_SUFFIX}-authenticated-role"

          set +e
          echo "Attempting imports (errors are non-fatal)"

          # ECR repository
          if aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" >/dev/null 2>&1; then
            terraform import "module.ecr.aws_ecr_repository.portal" "$ECR_REPO_NAME" || true
          fi

          # CloudWatch log group
          if aws logs describe-log-groups --log-group-name-prefix "$LOG_GROUP_NAME" --query 'logGroups[?logGroupName==`'"$LOG_GROUP_NAME"'`].logGroupName' --output text >/dev/null 2>&1; then
            terraform import "module.ecr.aws_cloudwatch_log_group.portal" "$LOG_GROUP_NAME" || true
          fi

          # EKS security group
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=$EKS_CLUSTER_SG_NAME" --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || true)
          if [[ -n "$SG_ID" && "$SG_ID" != "None" ]]; then
            terraform import "module.eks.aws_security_group.cluster" "$SG_ID" || true
          fi

          # RDS security group
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=$RDS_SG_NAME" --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || true)
          if [[ -n "$SG_ID" && "$SG_ID" != "None" ]]; then
            terraform import "module.rds.aws_security_group.rds" "$SG_ID" || true
          fi

          # IAM roles (cluster, node, cognito)
          for ROLE in "${CLUSTER_NAME}-${RESOURCE_SUFFIX}-cluster-role" "${CLUSTER_NAME}-${RESOURCE_SUFFIX}-node-role" "$COGNITO_ROLE_NAME"; do
            if aws iam get-role --role-name "$ROLE" >/dev/null 2>&1; then
              case "$ROLE" in
                *-cluster-role)
                  terraform import "module.eks.aws_iam_role.cluster" "$ROLE" || true
                  ;;
                *-node-role)
                  terraform import "module.eks.aws_iam_role.node" "$ROLE" || true
                  ;;
                *authenticated-role)
                  terraform import "module.cognito.aws_iam_role.cognito_authenticated" "$ROLE" || true
                  ;;
              esac
            fi
          done

          # RDS subnet group
          if aws rds describe-db-subnet-groups --db-subnet-group-name "$RDS_SUBNET_GROUP_NAME" >/dev/null 2>&1; then
            terraform import "module.rds.aws_db_subnet_group.this" "$RDS_SUBNET_GROUP_NAME" || true
          fi

          # WAFv2 Web ACL (regional)
          WAF_ARN=$(aws wafv2 list-web-acls --scope REGIONAL --region ${{ env.AWS_REGION }} --query "WebACLs[?Name=='$WAF_NAME'].ARN | [0]" --output text 2>/dev/null || true)
          if [[ -n "$WAF_ARN" && "$WAF_ARN" != "None" ]]; then
            terraform import "module.waf.aws_wafv2_web_acl.portal" "$WAF_ARN" || true
          fi

          set -e

      - name: Terraform plan
        env:
          TF_VAR_resource_suffix: "v6"
          TF_VAR_use_default_vpc: "true"
          TF_VAR_manage_cognito_domain: "false"
        run: terraform plan -var="db_password=${{ secrets.CS3_DB_PASSWORD || vars.CS3_DB_PASSWORD }}" -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: cs3/terraform/tfplan

  apply:
    name: Terraform Apply
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: cs3/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}" || (echo "Missing AWS_ROLE_TO_ASSUME" && exit 1)
          test -n "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}" || (echo "Missing TF_BACKEND_BUCKET" && exit 1)
          test -n "${{ secrets.CS3_DB_PASSWORD }}" || (echo "Missing CS3_DB_PASSWORD (must be in Secrets, not Variables)" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-cs3-apply
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}"
          key            = "cs3/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "terraform-locks"
          EOF

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: Set Terraform variables from secrets
        run: |
          DB_PASSWORD="${{ secrets.CS3_DB_PASSWORD }}"
          [[ -n "$DB_PASSWORD" ]] && echo "TF_VAR_db_password=$DB_PASSWORD" >> "$GITHUB_ENV" || true
          
          COGNITO_CALLBACK="${{ secrets.CS3_COGNITO_CALLBACK_URL || vars.CS3_COGNITO_CALLBACK_URL }}"
          [[ -n "$COGNITO_CALLBACK" ]] && echo "TF_VAR_cognito_callback_url=$COGNITO_CALLBACK" >> "$GITHUB_ENV" || true

      - name: Terraform plan
        env:
          TF_LOG: DEBUG
          TF_VAR_resource_suffix: "v6"
          TF_VAR_db_password: ${{ secrets.CS3_DB_PASSWORD }}
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD || secrets.CS3_GRAFANA_ADMIN_PASSWORD }}
          TF_VAR_use_default_vpc: "true"
          TF_VAR_manage_cognito_domain: "false"
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        env:
          TF_VAR_resource_suffix: "v6"
          TF_VAR_use_default_vpc: "true"
          TF_VAR_manage_cognito_domain: "false"
        run: terraform apply -auto-approve tfplan

      - name: Output Terraform values
        run: |
          echo "=== Deployment Outputs ===" 
          terraform output -json > /tmp/outputs.json
          cat /tmp/outputs.json

  database-init:
    name: Initialize Employee Database
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: apply
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-cs3-db-init
          aws-region: ${{ env.AWS_REGION }}

      - name: Get RDS endpoint
        working-directory: cs3/terraform
        run: |
          terraform init -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
                        -backend-config="key=cs3/terraform.tfstate" \
                        -backend-config="region=${{ env.AWS_REGION }}" \
                        -backend-config="encrypt=true" \
                        -backend-config="dynamodb_table=terraform-locks"
          RDS_ENDPOINT=$(terraform output -raw rds_endpoint)
          echo "RDS_HOST=${RDS_ENDPOINT%:*}" >> $GITHUB_ENV
          echo "RDS_PORT=${RDS_ENDPOINT##*:}" >> $GITHUB_ENV

      - name: Initialize database schema
        run: |
          psql -h "${{ env.RDS_HOST }}" \
               -p "${{ env.RDS_PORT }}" \
               -U admin \
               -d employees \
               -f cs3/terraform/rds/schema.sql \
               -v ON_ERROR_STOP=1
        env:
          PGPASSWORD: ${{ secrets.CS3_DB_PASSWORD }}
