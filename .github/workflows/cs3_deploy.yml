name: CS3 Deployment Pipeline

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-cs3
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  AUTO_DB_INIT: "${{ secrets.AUTO_DB_INIT || 'false' }}"
  TF_IN_AUTOMATION: "true"

jobs:
  check:
    name: Fmt + Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cs3/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt (check)
        run: terraform fmt -recursive -check

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: cs3/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}" || (echo "Missing AWS_ROLE_TO_ASSUME" && exit 1)
          test -n "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}" || (echo "Missing TF_BACKEND_BUCKET" && exit 1)
          test -n "${{ secrets.CS3_DB_PASSWORD || vars.CS3_DB_PASSWORD }}" || (echo "Missing CS3_DB_PASSWORD" && exit 1)
          test -n "${{ secrets.GRAFANA_ADMIN_PASSWORD }}" || (echo "Missing GRAFANA_ADMIN_PASSWORD" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-cs3-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}"
          key            = "cs3/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "terraform-locks"
          EOF

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: "Set Terraform variables from secrets"
        env:
          DB_PASSWORD: "${{ secrets.CS3_DB_PASSWORD || vars.CS3_DB_PASSWORD }}"
          GRAFANA_PASSWORD: "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
        run: |
          # Set required variables for terraform apply
          if [[ -n "$DB_PASSWORD" ]]; then
            echo "TF_VAR_db_password=$DB_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "ERROR: CS3_DB_PASSWORD not set in secrets or variables. Aborting."
            exit 1
          fi
          if [[ -n "$GRAFANA_PASSWORD" ]]; then
            echo "TF_VAR_grafana_admin_password=$GRAFANA_PASSWORD" >> "$GITHUB_ENV"
          fi
          echo "TF_VAR_resource_suffix=" >> "$GITHUB_ENV"
          echo "TF_VAR_use_default_vpc=true" >> "$GITHUB_ENV"
          echo "TF_VAR_manage_cognito_domain=false" >> "$GITHUB_ENV"
          echo "✓ Terraform variables set from secrets"

      - name: Auto-import existing AWS resources
        run: |
          set -euo pipefail
          echo "Auto-import: detecting existing AWS resources to import into Terraform state"

          NAME_PREFIX="${TF_VAR_name_prefix:-cs3}"
          RESOURCE_SUFFIX="${TF_VAR_resource_suffix:-}"
          AWS_REGION="${{ env.AWS_REGION }}"

          ECR_REPO_NAME="${NAME_PREFIX}-portal${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          COGNITO_USER_POOL_NAME="${NAME_PREFIX}-employees${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          COGNITO_USER_POOL_CLIENT_NAME="${COGNITO_USER_POOL_NAME}-client"
          COGNITO_IDENTITY_POOL_NAME="${NAME_PREFIX}-identity-pool${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          WAF_NAME="${NAME_PREFIX}-portal-waf${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          COGNITO_ROLE_NAME="${COGNITO_USER_POOL_NAME}-authenticated-role"
          COGNITO_ROLE_POLICY_NAME="${COGNITO_USER_POOL_NAME}-authenticated-policy"

          export TF_IN_AUTOMATION=true
          set +e
          echo "Looking up and importing existing resources (non-fatal if not found)"

          # 1) ECR repo
          if aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Importing ECR repository: $ECR_REPO_NAME"
            terraform import -input=false -lock=false module.ecr.aws_ecr_repository.portal "$ECR_REPO_NAME" 2>/dev/null || echo "  (skipped - may already be in state)"
          fi

          # 2) Cognito user pool
          POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 --region "$AWS_REGION" --query "UserPools[?Name=='$COGNITO_USER_POOL_NAME'].Id | [0]" --output text 2>/dev/null || true)
          if [[ -n "$POOL_ID" && "$POOL_ID" != "None" ]]; then
            echo "Importing Cognito User Pool: $POOL_ID"
            terraform import -input=false -lock=false module.cognito.aws_cognito_user_pool.this "$POOL_ID" 2>/dev/null || echo "  (skipped - may already be in state)"

          fi

          # 3) Cognito identity pool
          IDENTITY_POOL_ID=$(aws cognito-identity list-identity-pools --max-results 60 --region "$AWS_REGION" --query "IdentityPools[?IdentityPoolName=='$COGNITO_IDENTITY_POOL_NAME'].IdentityPoolId | [0]" --output text 2>/dev/null || true)
          if [[ -n "$IDENTITY_POOL_ID" && "$IDENTITY_POOL_ID" != "None" ]]; then
            echo "Importing Cognito Identity Pool: $IDENTITY_POOL_ID"
            terraform import -input=false -lock=false aws_cognito_identity_pool.this "$IDENTITY_POOL_ID" 2>/dev/null || echo "  (skipped - may already be in state)"
          fi

          echo "✓ Auto-import phase complete"

          if aws iam get-role --role-name "$COGNITO_ROLE_NAME" >/dev/null 2>&1; then
            if [[ -n "$COGNITO_ROLE_NAME" ]]; then
              echo "Importing IAM role (cognito authenticated): $COGNITO_ROLE_NAME"
              terraform import -input=false -lock=false module.cognito.aws_iam_role.cognito_authenticated "$COGNITO_ROLE_NAME" || echo "Import IAM cognito role failed"
              terraform import -input=false -lock=false module.cognito.aws_iam_role_policy.cognito_authenticated_policy "$COGNITO_ROLE_NAME:$COGNITO_ROLE_POLICY_NAME" || echo "Import IAM cognito role policy failed"
            fi
          fi

          if [[ -n "$POOL_ID" && "$POOL_ID" != "None" ]]; then
            COGNITO_CLIENT_ID=$(aws cognito-idp list-user-pool-clients --user-pool-id "$POOL_ID" --region "$AWS_REGION" --query "UserPoolClients[?ClientName=='$COGNITO_USER_POOL_CLIENT_NAME'].ClientId | [0]" --output text 2>/dev/null || true)
            if [[ -n "$COGNITO_CLIENT_ID" && "$COGNITO_CLIENT_ID" != "None" ]]; then
              terraform import -input=false -lock=false module.cognito.aws_cognito_user_pool_client.this "$POOL_ID/$COGNITO_CLIENT_ID" || echo "Import Cognito client failed"
            fi

            COGNITO_RESOURCE_SERVER_PRESENT=$(aws cognito-idp list-resource-servers --user-pool-id "$POOL_ID" --region "$AWS_REGION" --query "ResourceServers[?Identifier=='cs3-api'].Identifier | [0]" --output text 2>/dev/null || true)
            if [[ -n "$COGNITO_RESOURCE_SERVER_PRESENT" && "$COGNITO_RESOURCE_SERVER_PRESENT" != "None" ]]; then
              terraform import -input=false -lock=false module.cognito.aws_cognito_resource_server.this[0] "$POOL_ID|cs3-api" || echo "Import Cognito resource server failed"
            fi
          fi

          # RDS is removed from CS3; skipping RDS imports

          # 7) WAFv2 Web ACL (regional)
          WAF_ID=$(aws wafv2 list-web-acls --scope REGIONAL --region "$AWS_REGION" --query "WebACLs[?Name=='$WAF_NAME'].Id | [0]" --output text 2>/dev/null || true)
          if [[ -n "$WAF_ID" && "$WAF_ID" != "None" ]]; then
            WAF_IMPORT_ID="$WAF_ID/$WAF_NAME/REGIONAL"
            echo "Importing WAFv2 Web ACL: $WAF_IMPORT_ID"
            terraform import -input=false -lock=false module.waf.aws_wafv2_web_acl.portal "$WAF_IMPORT_ID" || echo "Import WAF failed"
          fi

          # summary
          echo "Auto-import complete (some imports may have failed but we'll continue)."
          set -e

      - name: Terraform plan
        env:
          TF_LOG: DEBUG
          TF_VAR_resource_suffix: ""
          TF_VAR_db_password: "${{ secrets.CS3_DB_PASSWORD }}"
          TF_VAR_grafana_admin_password: "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          TF_VAR_use_default_vpc: "true"
          TF_VAR_manage_cognito_domain: "false"
        run: terraform plan -input=false -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: cs3/terraform/tfplan

  apply:
    name: Terraform Apply
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: cs3/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}" || (echo "Missing AWS_ROLE_TO_ASSUME" && exit 1)
          test -n "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}" || (echo "Missing TF_BACKEND_BUCKET" && exit 1)
          test -n "${{ secrets.CS3_DB_PASSWORD }}" || (echo "Missing CS3_DB_PASSWORD (must be in Secrets, not Variables)" && exit 1)
          test -n "${{ secrets.GRAFANA_ADMIN_PASSWORD }}" || (echo "Missing GRAFANA_ADMIN_PASSWORD" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-cs3-apply
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}"
          key            = "cs3/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "terraform-locks"
          EOF

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: "Set Terraform variables from secrets"
        env:
          DB_PASSWORD: "${{ secrets.CS3_DB_PASSWORD }}"
          GRAFANA_PASSWORD: "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
        run: |
          if [[ -n "$DB_PASSWORD" ]]; then
            echo "TF_VAR_db_password=$DB_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "ERROR: CS3_DB_PASSWORD not set in Secrets. Aborting."
            exit 1
          fi
          if [[ -n "$GRAFANA_PASSWORD" ]]; then
            echo "TF_VAR_grafana_admin_password=$GRAFANA_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "ERROR: GRAFANA_ADMIN_PASSWORD not set in Secrets. Aborting."
            exit 1
          fi
          echo "TF_VAR_resource_suffix=" >> "$GITHUB_ENV"
          echo "TF_VAR_use_default_vpc=true" >> "$GITHUB_ENV"
          echo "TF_VAR_manage_cognito_domain=false" >> "$GITHUB_ENV"
          echo "✓ Terraform variables set from secrets"

      - name: Auto-import existing AWS resources
        run: |
          set -euo pipefail
          echo "Auto-import: detecting existing AWS resources to import"

          NAME_PREFIX="${TF_VAR_name_prefix:-cs3}"
          RESOURCE_SUFFIX="${TF_VAR_resource_suffix:-}"
          AWS_REGION="${{ env.AWS_REGION }}"

          ECR_REPO_NAME="${NAME_PREFIX}-portal${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          COGNITO_USER_POOL_NAME="${NAME_PREFIX}-employees${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          COGNITO_USER_POOL_CLIENT_NAME="${COGNITO_USER_POOL_NAME}-client"
          COGNITO_IDENTITY_POOL_NAME="${NAME_PREFIX}-identity-pool${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          COGNITO_ROLE_NAME="${COGNITO_USER_POOL_NAME}-authenticated-role"
          COGNITO_ROLE_POLICY_NAME="${COGNITO_USER_POOL_NAME}-authenticated-policy"
          WAF_NAME="${NAME_PREFIX}-portal-waf${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          K3S_SG_NAME="${NAME_PREFIX}-k3s-sg${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          K3S_ROLE_NAME="${NAME_PREFIX}-k3s-role${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          K3S_PROFILE_NAME="${NAME_PREFIX}-k3s-profile${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          K3S_INSTANCE_NAME="${NAME_PREFIX}-k3s${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          K3S_EIP_NAME="${NAME_PREFIX}-k3s-eip${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          CLUSTER_NAME="${TF_VAR_cluster_name:-cs3-k3s-cluster}"
          PORTAL_LOG_GROUP_NAME="/aws/eks/${CLUSTER_NAME}${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}/portal"

          export TF_IN_AUTOMATION=true
          echo "Looking up and importing resources (idempotent mode)"

          tf_in_state() {
            # Check if address exists in state. Try plain and indexed form for counted resources.
            if terraform state show "$1" >/dev/null 2>&1; then
              return 0
            fi
            if terraform state show "${1}[0]" >/dev/null 2>&1; then
              return 0
            fi
            return 1
          }

          tf_import_if_needed() {
            local address="$1"
            local import_id="$2"

            if [[ -z "$import_id" || "$import_id" == "None" || "$import_id" == "null" ]]; then
              return 0
            fi

            if tf_in_state "$address"; then
              echo "State already has: $address"
              return 0
            fi

            # Try plain address first, then indexed [0] form for counted resources
            echo "Attempting import: $address => $import_id"
            if terraform import -input=false -lock=false "$address" "$import_id" >/dev/null 2>&1; then
              echo "Imported $address"
              return 0
            fi

            idx_addr="${address}[0]"
            echo "Attempting indexed import: $idx_addr => $import_id"
            if terraform import -input=false -lock=false "$idx_addr" "$import_id" >/dev/null 2>&1; then
              echo "Imported $idx_addr"
              return 0
            fi

            echo "  (skipped: import failed for $address and $idx_addr)"
            return 1
          }

          # ECR
          if aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            tf_import_if_needed "module.ecr.aws_ecr_repository.portal" "$ECR_REPO_NAME"
          fi

          # CloudWatch log group created by module.ecr
          if aws logs describe-log-groups --log-group-name-prefix "$PORTAL_LOG_GROUP_NAME" --region "$AWS_REGION" --query "logGroups[?logGroupName=='$PORTAL_LOG_GROUP_NAME'].logGroupName | [0]" --output text >/dev/null 2>&1; then
            tf_import_if_needed "module.ecr.aws_cloudwatch_log_group.portal" "$PORTAL_LOG_GROUP_NAME"
          fi

          # Cognito core resources
          COGNITO_USER_POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 --region "$AWS_REGION" --query "UserPools[?Name=='$COGNITO_USER_POOL_NAME'].Id | [0]" --output text 2>/dev/null || true)
          tf_import_if_needed "module.cognito.aws_cognito_user_pool.this" "$COGNITO_USER_POOL_ID"

          if [[ -n "$COGNITO_USER_POOL_ID" && "$COGNITO_USER_POOL_ID" != "None" ]]; then
            COGNITO_CLIENT_ID=$(aws cognito-idp list-user-pool-clients --user-pool-id "$COGNITO_USER_POOL_ID" --region "$AWS_REGION" --query "UserPoolClients[?ClientName=='$COGNITO_USER_POOL_CLIENT_NAME'].ClientId | [0]" --output text 2>/dev/null || true)
            tf_import_if_needed "module.cognito.aws_cognito_user_pool_client.this" "$COGNITO_USER_POOL_ID/$COGNITO_CLIENT_ID"

          fi

          COGNITO_IDENTITY_POOL_ID=$(aws cognito-identity list-identity-pools --max-results 60 --region "$AWS_REGION" --query "IdentityPools[?IdentityPoolName=='$COGNITO_IDENTITY_POOL_NAME'].IdentityPoolId | [0]" --output text 2>/dev/null || true)
          tf_import_if_needed "aws_cognito_identity_pool.this" "$COGNITO_IDENTITY_POOL_ID"

          if aws iam get-role --role-name "$COGNITO_ROLE_NAME" >/dev/null 2>&1; then
            tf_import_if_needed "module.cognito.aws_iam_role.cognito_authenticated" "$COGNITO_ROLE_NAME"
            tf_import_if_needed "module.cognito.aws_iam_role_policy.cognito_authenticated_policy" "$COGNITO_ROLE_NAME:$COGNITO_ROLE_POLICY_NAME"
          fi

          # EC2 K3s resources
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=$K3S_SG_NAME" --region "$AWS_REGION" --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || true)
          tf_import_if_needed "module.ec2_k3s.aws_security_group.k3s" "$SG_ID"

          if aws iam get-role --role-name "$K3S_ROLE_NAME" >/dev/null 2>&1; then
            tf_import_if_needed "module.ec2_k3s.aws_iam_role.k3s" "$K3S_ROLE_NAME"
            tf_import_if_needed "module.ec2_k3s.aws_iam_role_policy_attachment.k3s_ssm" "$K3S_ROLE_NAME/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
          fi

          if aws iam get-instance-profile --instance-profile-name "$K3S_PROFILE_NAME" >/dev/null 2>&1; then
            tf_import_if_needed "module.ec2_k3s.aws_iam_instance_profile.k3s" "$K3S_PROFILE_NAME"
          fi

          K3S_INSTANCE_ID=$(aws ec2 describe-instances --region "$AWS_REGION" --filters "Name=tag:Name,Values=$K3S_INSTANCE_NAME" "Name=instance-state-name,Values=pending,running,stopping,stopped" --query "Reservations[].Instances[].InstanceId | [0]" --output text 2>/dev/null || true)
          tf_import_if_needed "module.ec2_k3s.aws_instance.k3s" "$K3S_INSTANCE_ID"

          K3S_EIP_ALLOC_ID=$(aws ec2 describe-addresses --region "$AWS_REGION" --filters "Name=tag:Name,Values=$K3S_EIP_NAME" --query "Addresses[0].AllocationId" --output text 2>/dev/null || true)
          tf_import_if_needed "module.ec2_k3s.aws_eip.k3s" "$K3S_EIP_ALLOC_ID"

          # WAF
          WAF_ID=$(aws wafv2 list-web-acls --scope REGIONAL --region "$AWS_REGION" --query "WebACLs[?Name=='$WAF_NAME'].Id | [0]" --output text 2>/dev/null || true)
          WAF_IMPORT_ID="${WAF_ID}/${WAF_NAME}/REGIONAL"
          tf_import_if_needed "module.waf.aws_wafv2_web_acl.portal" "$WAF_IMPORT_ID"

          echo "Auto-import complete."

      - name: "Set Terraform variables from secrets"
        env:
          DB_PASSWORD: "${{ secrets.CS3_DB_PASSWORD }}"
          COGNITO_CALLBACK: "${{ secrets.CS3_COGNITO_CALLBACK_URL || vars.CS3_COGNITO_CALLBACK_URL }}"
        run: |
          [[ -n "$DB_PASSWORD" ]] && echo "TF_VAR_db_password=$DB_PASSWORD" >> "$GITHUB_ENV" || true
          [[ -n "$COGNITO_CALLBACK" ]] && echo "TF_VAR_cognito_callback_url=$COGNITO_CALLBACK" >> "$GITHUB_ENV" || true

      - name: Terraform plan
        env:
          TF_LOG: DEBUG
          TF_VAR_resource_suffix: ""
          TF_VAR_db_password: "${{ secrets.CS3_DB_PASSWORD }}"
          TF_VAR_grafana_admin_password: "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          TF_VAR_use_default_vpc: "true"
          TF_VAR_manage_cognito_domain: "false"
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        env:
          TF_VAR_resource_suffix: ""
          TF_VAR_db_password: "${{ secrets.CS3_DB_PASSWORD }}"
          TF_VAR_grafana_admin_password: "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          TF_VAR_use_default_vpc: "true"
          TF_VAR_manage_cognito_domain: "false"
        run: terraform apply -auto-approve tfplan

      - name: Output Terraform values
        run: |
          echo "=== Deployment Outputs ===" 
          terraform output -json > /tmp/outputs.json
          cat /tmp/outputs.json

  database-init:
    name: Initialize Employee Database
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: apply
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-cs3-db-init
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Get database endpoint (PostgreSQL on EC2)
        working-directory: cs3/terraform
        run: |
          terraform init -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
                        -backend-config="key=cs3/terraform.tfstate" \
                        -backend-config="region=${{ env.AWS_REGION }}" \
                        -backend-config="encrypt=true" \
                        -backend-config="dynamodb_table=terraform-locks"
          # Prefer the EC2-hosted PostgreSQL endpoint if present
          PG_ENDPOINT=$(terraform output -raw postgresql_endpoint 2>/dev/null || true)
          if [[ -n "$PG_ENDPOINT" && "$PG_ENDPOINT" != "null" ]]; then
            echo "Detected PostgreSQL endpoint: $PG_ENDPOINT"
            echo "RDS_HOST=${PG_ENDPOINT%:*}" >> $GITHUB_ENV
            echo "RDS_PORT=${PG_ENDPOINT##*:}" >> $GITHUB_ENV
          else
            echo "No postgresql_endpoint output found. Skipping DB host setup."
          fi

      - name: Initialize database schema (manual by default)
        run: |
          if [[ "${{ env.AUTO_DB_INIT }}" == "true" ]]; then
            echo "Running DB initialization against ${RDS_HOST}:${RDS_PORT}"
            psql -h "${{ env.RDS_HOST }}" \
                 -p "${{ env.RDS_PORT }}" \
                 -U admin \
                 -d employees \
                 -f cs3/terraform/rds/schema.sql \
                 -v ON_ERROR_STOP=1
          else
            echo "AUTO_DB_INIT is not true; skipping automatic DB initialization."
            echo "To initialize the DB manually, SSH/SSM to the EC2 instance and run:"
            echo "  psql -h <db_host> -p <db_port> -U admin -d employees -f cs3/terraform/rds/schema.sql"
          fi
        env:
          PGPASSWORD: "${{ secrets.CS3_DB_PASSWORD }}"
