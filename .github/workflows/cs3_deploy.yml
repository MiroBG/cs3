name: CS3 Deployment Pipeline

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-cs3
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  AUTO_DB_INIT: "${{ secrets.AUTO_DB_INIT || 'true' }}"
  TF_IN_AUTOMATION: "true"

jobs:
  check:
    name: Fmt + Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cs3/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt (check)
        run: terraform fmt -recursive -check

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate


  apply:
    name: Terraform Apply
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: cs3/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}" || (echo "Missing AWS_ROLE_TO_ASSUME" && exit 1)
          test -n "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}" || (echo "Missing TF_BACKEND_BUCKET" && exit 1)
          test -n "${{ secrets.CS3_DB_PASSWORD }}" || (echo "Missing CS3_DB_PASSWORD (must be in Secrets, not Variables)" && exit 1)
          test -n "${{ secrets.GRAFANA_ADMIN_PASSWORD }}" || (echo "Missing GRAFANA_ADMIN_PASSWORD" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-cs3-apply
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}"
          key            = "cs3/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "terraform-locks"
          EOF

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: "Set Terraform variables from secrets"
        env:
          DB_PASSWORD: "${{ secrets.CS3_DB_PASSWORD }}"
          GRAFANA_PASSWORD: "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
        run: |
          if [[ -n "$DB_PASSWORD" ]]; then
            echo "TF_VAR_db_password=$DB_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "ERROR: CS3_DB_PASSWORD not set in Secrets. Aborting."
            exit 1
          fi
          if [[ -n "$GRAFANA_PASSWORD" ]]; then
            echo "TF_VAR_grafana_admin_password=$GRAFANA_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "ERROR: GRAFANA_ADMIN_PASSWORD not set in Secrets. Aborting."
            exit 1
          fi
          echo "TF_VAR_resource_suffix=" >> "$GITHUB_ENV"
          echo "TF_VAR_use_default_vpc=false" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_nat_gateway=false" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_ssm_vpc_endpoints=false" >> "$GITHUB_ENV"
          echo "TF_VAR_create_k3s_instance=true" >> "$GITHUB_ENV"
          echo "TF_VAR_ec2_instance_type=t2.small" >> "$GITHUB_ENV"
          echo "TF_VAR_manage_cognito_domain=true" >> "$GITHUB_ENV"
          echo "✓ Terraform variables set from secrets"

      - name: Auto-import existing AWS resources
        run: |
          set -euo pipefail
          echo "Auto-import: detecting existing AWS resources to import"

          NAME_PREFIX="${TF_VAR_name_prefix:-cs3}"
          RESOURCE_SUFFIX="${TF_VAR_resource_suffix:-}"
          # Use the shell env var (workflow-level env.AWS_REGION) rather than a
          # GitHub expression here: any such expression in this large run block
          # forces GitHub to template-compile the whole block under its
          # 21000-character expression-length limit, which this block exceeds.
          AWS_REGION="${AWS_REGION}"

          ECR_REPO_NAME="${NAME_PREFIX}-portal${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          COGNITO_USER_POOL_NAME="${NAME_PREFIX}-employees${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          COGNITO_USER_POOL_CLIENT_NAME="${COGNITO_USER_POOL_NAME}-client"
          COGNITO_IDENTITY_POOL_NAME="${NAME_PREFIX}-identity-pool${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          COGNITO_ROLE_NAME="${COGNITO_USER_POOL_NAME}-authenticated-role"
          COGNITO_ROLE_POLICY_NAME="${COGNITO_USER_POOL_NAME}-authenticated-policy"
          WAF_NAME="${NAME_PREFIX}-portal-waf${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          K3S_SG_NAME="${NAME_PREFIX}-k3s-sg${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          VPC_ENDPOINT_SG_NAME="${NAME_PREFIX}-ssm-endpoints-sg"
          K3S_ROLE_NAME="${NAME_PREFIX}-k3s-role${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          K3S_KUBECONFIG_POLICY_NAME="${NAME_PREFIX}-k3s-kubeconfig-parameter${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          K3S_COGNITO_ADMIN_POLICY_NAME="${NAME_PREFIX}-k3s-cognito-admin${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          K3S_PROFILE_NAME="${NAME_PREFIX}-k3s-profile${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          K3S_INSTANCE_NAME="${NAME_PREFIX}-k3s${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          K3S_EIP_NAME="${NAME_PREFIX}-k3s-eip${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          K3S_VPC_ID=""
          CLUSTER_NAME="${TF_VAR_cluster_name:-cs3-k3s-cluster}"
          PORTAL_LOG_GROUP_NAME="/aws/eks/${CLUSTER_NAME}${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}/portal"
          ENABLE_SSM_VPC_ENDPOINTS="${TF_VAR_enable_ssm_vpc_endpoints:-false}"

          export TF_IN_AUTOMATION=true
          echo "Looking up and importing resources (idempotent mode)"

          tf_in_state() {
            # Check if address exists in state. Try plain and indexed form for counted resources.
            if terraform state show "$1" >/dev/null 2>&1; then
              return 0
            fi
            if terraform state show "${1}[0]" >/dev/null 2>&1; then
              return 0
            fi
            return 1
          }

          tf_state_address() {
            local address="$1"
            local idx_addr="$address"
            if [[ "$address" != *"]" ]]; then
              idx_addr="${address}[0]"
            fi

            if terraform state show "$address" >/dev/null 2>&1; then
              echo "$address"
              return 0
            fi
            if terraform state show "$idx_addr" >/dev/null 2>&1; then
              echo "$idx_addr"
              return 0
            fi
            return 1
          }

          tf_import_if_needed() {
            local address="$1"
            local import_id="$2"
            local idx_addr="$address"
            local state_addr=""
            local import_log=""

            if [[ -z "$import_id" || "$import_id" == "None" || "$import_id" == "null" ]]; then
              return 0
            fi

            if [[ "$address" != *"]" ]]; then
              idx_addr="${address}[0]"
            fi

            state_addr=$(tf_state_address "$address" || true)
            if [[ -n "$state_addr" ]]; then
              echo "Rebinding Terraform state for $state_addr"
              terraform state rm "$state_addr" >/dev/null 2>&1 || true
            fi

            import_log=$(mktemp)
            # Try plain address first, then indexed [0] form for counted resources
            echo "Attempting import: $address => $import_id"
            if terraform import -input=false -lock=false "$address" "$import_id" >"$import_log" 2>&1; then
              echo "Imported $address"
              rm -f "$import_log"
              return 0
            fi

            echo "Attempting indexed import: $idx_addr => $import_id"
            if terraform import -input=false -lock=false "$idx_addr" "$import_id" >>"$import_log" 2>&1; then
              echo "Imported $idx_addr"
              rm -f "$import_log"
              return 0
            fi

            echo "ERROR: import failed for $address and $idx_addr"
            sed -n '1,80p' "$import_log" | sed 's/^/  /'
            rm -f "$import_log"
            exit 1
          }

          # ECR (only import if repo exists in AWS)
          ECR_REPO_EXISTS=$(aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" --region "$AWS_REGION" --query 'repositories[0].repositoryUri' --output text 2>/dev/null || echo "")
          if [[ -n "$ECR_REPO_EXISTS" && "$ECR_REPO_EXISTS" != "None" ]]; then
            tf_import_if_needed "module.ecr.aws_ecr_repository.portal" "$ECR_REPO_NAME"
            tf_import_if_needed "module.ecr.aws_ecr_lifecycle_policy.portal" "$ECR_REPO_NAME"
          else
            echo "ECR repo not found in AWS. Terraform will create it."
          fi

          # CloudWatch log group (only if it actually exists; skip for EC2 k3s which doesn't auto-create it)
          PORTAL_LOG_EXISTS=$(aws logs describe-log-groups --log-group-name-prefix "$PORTAL_LOG_GROUP_NAME" --region "$AWS_REGION" --query "logGroups[?logGroupName=='$PORTAL_LOG_GROUP_NAME'].logGroupName | [0]" --output text 2>/dev/null || echo "")
          if [[ -n "$PORTAL_LOG_EXISTS" && "$PORTAL_LOG_EXISTS" != "None" ]]; then
            tf_import_if_needed "module.ecr.aws_cloudwatch_log_group.portal" "$PORTAL_LOG_GROUP_NAME"
          else
            echo "CloudWatch log group not found. Skipping import."
          fi

          # EC2 k3s resources
          K3S_INSTANCE_ID=$(aws ec2 describe-instances --region "$AWS_REGION" --filters "Name=tag:Name,Values=$K3S_INSTANCE_NAME" "Name=instance-state-name,Values=pending,running,stopping,stopped" --query 'Reservations[0].Instances[0].InstanceId' --output text 2>/dev/null || echo "")
          if [[ -n "$K3S_INSTANCE_ID" && "$K3S_INSTANCE_ID" != "None" ]]; then
            K3S_VPC_ID=$(aws ec2 describe-instances --region "$AWS_REGION" --instance-ids "$K3S_INSTANCE_ID" --query 'Reservations[0].Instances[0].VpcId' --output text 2>/dev/null || echo "")
            K3S_SG_ID=$(aws ec2 describe-security-groups --region "$AWS_REGION" --filters "Name=group-name,Values=$K3S_SG_NAME" "Name=vpc-id,Values=$K3S_VPC_ID" --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "")
            if [[ -n "$K3S_SG_ID" && "$K3S_SG_ID" != "None" ]]; then
              tf_import_if_needed "module.ec2_k3s.aws_security_group.k3s" "$K3S_SG_ID"
            fi

            if [[ "$ENABLE_SSM_VPC_ENDPOINTS" == "true" ]]; then
              VPC_ENDPOINT_SG_ID=$(aws ec2 describe-security-groups --region "$AWS_REGION" --filters "Name=group-name,Values=$VPC_ENDPOINT_SG_NAME" "Name=vpc-id,Values=$K3S_VPC_ID" --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "")
              if [[ -n "$VPC_ENDPOINT_SG_ID" && "$VPC_ENDPOINT_SG_ID" != "None" ]]; then
                tf_import_if_needed "module.vpc.aws_security_group.vpc_endpoints[0]" "$VPC_ENDPOINT_SG_ID"
              fi
            fi

            if aws iam get-role --role-name "$K3S_ROLE_NAME" >/dev/null 2>&1; then
              tf_import_if_needed "module.ec2_k3s.aws_iam_role.k3s" "$K3S_ROLE_NAME"
              K3S_SSM_ATTACHED=$(aws iam list-attached-role-policies --role-name "$K3S_ROLE_NAME" --region "$AWS_REGION" --query "AttachedPolicies[?PolicyArn=='arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'].PolicyArn | [0]" --output text 2>/dev/null || echo "")
              if [[ -n "$K3S_SSM_ATTACHED" && "$K3S_SSM_ATTACHED" != "None" ]]; then
                tf_import_if_needed "module.ec2_k3s.aws_iam_role_policy_attachment.k3s_ssm" "$K3S_ROLE_NAME/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
              else
                echo "SSM policy not attached yet. Terraform will create attachment."
              fi

              if aws iam get-role-policy --role-name "$K3S_ROLE_NAME" --policy-name "$K3S_KUBECONFIG_POLICY_NAME" >/dev/null 2>&1; then
                tf_import_if_needed "module.ec2_k3s.aws_iam_role_policy.k3s_kubeconfig_parameter" "$K3S_ROLE_NAME:$K3S_KUBECONFIG_POLICY_NAME"
              fi
              if aws iam get-role-policy --role-name "$K3S_ROLE_NAME" --policy-name "$K3S_COGNITO_ADMIN_POLICY_NAME" >/dev/null 2>&1; then
                tf_import_if_needed "module.ec2_k3s.aws_iam_role_policy.k3s_cognito_admin" "$K3S_ROLE_NAME:$K3S_COGNITO_ADMIN_POLICY_NAME"
              fi
            fi

            if aws iam get-instance-profile --instance-profile-name "$K3S_PROFILE_NAME" >/dev/null 2>&1; then
              tf_import_if_needed "module.ec2_k3s.aws_iam_instance_profile.k3s" "$K3S_PROFILE_NAME"
            fi

            tf_import_if_needed "module.ec2_k3s.aws_instance.k3s" "$K3S_INSTANCE_ID"

            K3S_EIP_ALLOC_ID=$(aws ec2 describe-addresses --region "$AWS_REGION" --filters "Name=tag:Name,Values=$K3S_EIP_NAME" --query 'Addresses[0].AllocationId' --output text 2>/dev/null || echo "")
            if [[ -n "$K3S_EIP_ALLOC_ID" && "$K3S_EIP_ALLOC_ID" != "None" ]]; then
              tf_import_if_needed "module.ec2_k3s.aws_eip.k3s" "$K3S_EIP_ALLOC_ID"
              K3S_EIP_ASSOC_ID=$(aws ec2 describe-addresses --region "$AWS_REGION" --allocation-ids "$K3S_EIP_ALLOC_ID" --query 'Addresses[0].AssociationId' --output text 2>/dev/null || echo "")
              if [[ -n "$K3S_EIP_ASSOC_ID" && "$K3S_EIP_ASSOC_ID" != "None" ]]; then
                tf_import_if_needed "module.ec2_k3s.aws_eip_association.k3s" "$K3S_EIP_ASSOC_ID"
              fi
            fi
          fi

          # Detect existing VPC endpoints for SSM-related services and import them
          # This only applies when endpoint resources are enabled in Terraform.
          if [[ "$ENABLE_SSM_VPC_ENDPOINTS" != "true" ]]; then
            echo "SSM VPC endpoints disabled. Skipping VPC endpoint imports."
          elif [[ -n "$K3S_VPC_ID" && "$K3S_VPC_ID" != "None" ]]; then
            echo "Checking for existing VPC endpoints in VPC $K3S_VPC_ID"
            echo "Listing security groups matching name/tag for debugging: $VPC_ENDPOINT_SG_NAME"
            aws ec2 describe-security-groups --region "$AWS_REGION" --filters "Name=group-name,Values=$VPC_ENDPOINT_SG_NAME" "Name=vpc-id,Values=$K3S_VPC_ID" --query 'SecurityGroups[].{Id:GroupId,Name:GroupName,Tags:Tags}' --output json || true
            aws ec2 describe-security-groups --region "$AWS_REGION" --filters "Name=tag:Name,Values=$VPC_ENDPOINT_SG_NAME" "Name=vpc-id,Values=$K3S_VPC_ID" --query 'SecurityGroups[].{Id:GroupId,Name:GroupName,Tags:Tags}' --output json || true
            echo "Listing VPC endpoints in this VPC (service, id, privateDnsEnabled)"
            aws ec2 describe-vpc-endpoints --region "$AWS_REGION" --filters "Name=vpc-id,Values=$K3S_VPC_ID" --query 'VpcEndpoints[].{Id:VpcEndpointId,ServiceName:ServiceName,PrivateDns:PrivateDnsEnabled}' --output json || true
            for svc in "com.amazonaws.${AWS_REGION}.ssm" "com.amazonaws.${AWS_REGION}.ssmmessages" "com.amazonaws.${AWS_REGION}.ec2messages"; do
              ENDPT_ID=$(aws ec2 describe-vpc-endpoints --region "$AWS_REGION" --filters "Name=service-name,Values=$svc" "Name=vpc-id,Values=$K3S_VPC_ID" --query 'VpcEndpoints[0].VpcEndpointId' --output text 2>/dev/null || echo "")
              if [[ -n "$ENDPT_ID" && "$ENDPT_ID" != "None" ]]; then
                echo "Found existing endpoint $svc -> $ENDPT_ID; attempting import"
                case "$svc" in
                  *ssm)
                    tf_import_if_needed "module.vpc.aws_vpc_endpoint.ssm[0]" "$ENDPT_ID" || tf_import_if_needed "module.vpc.aws_vpc_endpoint.ssm" "$ENDPT_ID"
                    ;;
                  *ssmmessages)
                    tf_import_if_needed "module.vpc.aws_vpc_endpoint.ssmmessages[0]" "$ENDPT_ID" || tf_import_if_needed "module.vpc.aws_vpc_endpoint.ssmmessages" "$ENDPT_ID"
                    ;;
                  *ec2messages)
                    tf_import_if_needed "module.vpc.aws_vpc_endpoint.ec2messages[0]" "$ENDPT_ID" || tf_import_if_needed "module.vpc.aws_vpc_endpoint.ec2messages" "$ENDPT_ID"
                    ;;
                esac
              else
                echo "No existing endpoint for $svc in VPC $K3S_VPC_ID"
              fi
            done
          else
            echo "K3S_VPC_ID unknown; skipping VPC endpoint import by VPC. Will try global lookup below."
            echo "Listing VPC endpoints across account for these services (debug)"
            aws ec2 describe-vpc-endpoints --region "$AWS_REGION" --filters "Name=service-name,Values=com.amazonaws.${AWS_REGION}.ssm,com.amazonaws.${AWS_REGION}.ssmmessages,com.amazonaws.${AWS_REGION}.ec2messages" --query 'VpcEndpoints[].{Id:VpcEndpointId,ServiceName:ServiceName,VpcId:VpcId,PrivateDns:PrivateDnsEnabled}' --output json || true

            for svc in "com.amazonaws.${AWS_REGION}.ssm" "com.amazonaws.${AWS_REGION}.ssmmessages" "com.amazonaws.${AWS_REGION}.ec2messages"; do
              ENDPT_ID=$(aws ec2 describe-vpc-endpoints --region "$AWS_REGION" --filters "Name=service-name,Values=$svc" --query 'VpcEndpoints[0].VpcEndpointId' --output text 2>/dev/null || echo "")
              if [[ -n "$ENDPT_ID" && "$ENDPT_ID" != "None" ]]; then
                echo "Found existing endpoint $svc -> $ENDPT_ID (global) ; attempting import"
                case "$svc" in
                  *ssm)
                    tf_import_if_needed "module.vpc.aws_vpc_endpoint.ssm[0]" "$ENDPT_ID" || tf_import_if_needed "module.vpc.aws_vpc_endpoint.ssm" "$ENDPT_ID"
                    ;;
                  *ssmmessages)
                    tf_import_if_needed "module.vpc.aws_vpc_endpoint.ssmmessages[0]" "$ENDPT_ID" || tf_import_if_needed "module.vpc.aws_vpc_endpoint.ssmmessages" "$ENDPT_ID"
                    ;;
                  *ec2messages)
                    tf_import_if_needed "module.vpc.aws_vpc_endpoint.ec2messages[0]" "$ENDPT_ID" || tf_import_if_needed "module.vpc.aws_vpc_endpoint.ec2messages" "$ENDPT_ID"
                    ;;
                esac
              fi
            done
          fi

          # Cognito core resources
          COGNITO_USER_POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 --region "$AWS_REGION" --query "UserPools[?Name=='$COGNITO_USER_POOL_NAME'].Id | [0]" --output text 2>/dev/null || echo "")
          if [[ -n "$COGNITO_USER_POOL_ID" && "$COGNITO_USER_POOL_ID" != "None" ]]; then
            tf_import_if_needed "module.cognito.aws_cognito_user_pool.this" "$COGNITO_USER_POOL_ID"

            COGNITO_CLIENT_ID=$(aws cognito-idp list-user-pool-clients --user-pool-id "$COGNITO_USER_POOL_ID" --region "$AWS_REGION" --query "UserPoolClients[?ClientName=='$COGNITO_USER_POOL_CLIENT_NAME'].ClientId | [0]" --output text 2>/dev/null || echo "")
            if [[ -n "$COGNITO_CLIENT_ID" && "$COGNITO_CLIENT_ID" != "None" ]]; then
              tf_import_if_needed "module.cognito.aws_cognito_user_pool_client.this" "$COGNITO_USER_POOL_ID/$COGNITO_CLIENT_ID"
            fi
          else
            echo "Cognito user pool not found. Terraform will create it."
          fi

          COGNITO_IDENTITY_POOL_ID=$(aws cognito-identity list-identity-pools --max-results 60 --region "$AWS_REGION" --query "IdentityPools[?IdentityPoolName=='$COGNITO_IDENTITY_POOL_NAME'].IdentityPoolId | [0]" --output text 2>/dev/null || echo "")
          if [[ -n "$COGNITO_IDENTITY_POOL_ID" && "$COGNITO_IDENTITY_POOL_ID" != "None" ]]; then
            tf_import_if_needed "aws_cognito_identity_pool.this" "$COGNITO_IDENTITY_POOL_ID"
          else
            echo "Cognito identity pool not found. Terraform will create it."
          fi

          if aws iam get-role --role-name "$COGNITO_ROLE_NAME" >/dev/null 2>&1; then
            tf_import_if_needed "module.cognito.aws_iam_role.cognito_authenticated" "$COGNITO_ROLE_NAME"
            tf_import_if_needed "module.cognito.aws_iam_role_policy.cognito_authenticated_policy" "$COGNITO_ROLE_NAME:$COGNITO_ROLE_POLICY_NAME"
          fi

          # EC2 K3s resources
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=$K3S_SG_NAME" --region "$AWS_REGION" --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || true)
          tf_import_if_needed "module.ec2_k3s.aws_security_group.k3s" "$SG_ID"

          if aws iam get-role --role-name "$K3S_ROLE_NAME" >/dev/null 2>&1; then
            tf_import_if_needed "module.ec2_k3s.aws_iam_role.k3s" "$K3S_ROLE_NAME"
            K3S_SSM_ATTACHED=$(aws iam list-attached-role-policies --role-name "$K3S_ROLE_NAME" --region "$AWS_REGION" --query "AttachedPolicies[?PolicyArn=='arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'].PolicyArn | [0]" --output text 2>/dev/null || echo "")
            if [[ -n "$K3S_SSM_ATTACHED" && "$K3S_SSM_ATTACHED" != "None" ]]; then
              tf_import_if_needed "module.ec2_k3s.aws_iam_role_policy_attachment.k3s_ssm" "$K3S_ROLE_NAME/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
            else
              echo "SSM policy not attached yet. Terraform will create attachment."
            fi

            if aws iam get-role-policy --role-name "$K3S_ROLE_NAME" --policy-name "$K3S_KUBECONFIG_POLICY_NAME" >/dev/null 2>&1; then
              tf_import_if_needed "module.ec2_k3s.aws_iam_role_policy.k3s_kubeconfig_parameter" "$K3S_ROLE_NAME:$K3S_KUBECONFIG_POLICY_NAME"
            fi
            if aws iam get-role-policy --role-name "$K3S_ROLE_NAME" --policy-name "$K3S_COGNITO_ADMIN_POLICY_NAME" >/dev/null 2>&1; then
              tf_import_if_needed "module.ec2_k3s.aws_iam_role_policy.k3s_cognito_admin" "$K3S_ROLE_NAME:$K3S_COGNITO_ADMIN_POLICY_NAME"
            fi
          fi

          if aws iam get-instance-profile --instance-profile-name "$K3S_PROFILE_NAME" >/dev/null 2>&1; then
            tf_import_if_needed "module.ec2_k3s.aws_iam_instance_profile.k3s" "$K3S_PROFILE_NAME"
          fi

          K3S_INSTANCE_ID=$(aws ec2 describe-instances --region "$AWS_REGION" --filters "Name=tag:Name,Values=$K3S_INSTANCE_NAME" "Name=instance-state-name,Values=pending,running,stopping,stopped" --query "Reservations[].Instances[].InstanceId | [0]" --output text 2>/dev/null || true)
          tf_import_if_needed "module.ec2_k3s.aws_instance.k3s" "$K3S_INSTANCE_ID"

          if [[ "$ENABLE_SSM_VPC_ENDPOINTS" == "true" ]]; then
            # Try to find and import the VPC endpoint security group even if the k3s EC2 instance
            # doesn't exist yet. We try multiple lookup strategies (group-name, tag:Name)
            # and optionally constrain by VPC when we can discover it from the instance.
            VPC_ENDPOINT_SG_ID=""
            if [[ -n "$K3S_INSTANCE_ID" && "$K3S_INSTANCE_ID" != "None" ]]; then
              K3S_VPC_ID=$(aws ec2 describe-instances --region "$AWS_REGION" --instance-ids "$K3S_INSTANCE_ID" --query 'Reservations[0].Instances[0].VpcId' --output text 2>/dev/null || echo "")
            else
              K3S_VPC_ID=""
            fi

            if [[ -n "$K3S_VPC_ID" && "$K3S_VPC_ID" != "None" ]]; then
              echo "Looking for endpoint SG by group-name within VPC $K3S_VPC_ID"
              VPC_ENDPOINT_SG_ID=$(aws ec2 describe-security-groups --region "$AWS_REGION" --filters "Name=group-name,Values=$VPC_ENDPOINT_SG_NAME" "Name=vpc-id,Values=$K3S_VPC_ID" --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "")
            fi

            if [[ -z "$VPC_ENDPOINT_SG_ID" || "$VPC_ENDPOINT_SG_ID" == "None" ]]; then
              echo "Fallback: looking for endpoint SG by tag:Name across the VPCs"
              VPC_ENDPOINT_SG_ID=$(aws ec2 describe-security-groups --region "$AWS_REGION" --filters "Name=tag:Name,Values=$VPC_ENDPOINT_SG_NAME" --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "")
            fi

            if [[ -z "$VPC_ENDPOINT_SG_ID" || "$VPC_ENDPOINT_SG_ID" == "None" ]]; then
              echo "Fallback: looking for endpoint SG by group-name across the VPCs"
              VPC_ENDPOINT_SG_ID=$(aws ec2 describe-security-groups --region "$AWS_REGION" --filters "Name=group-name,Values=$VPC_ENDPOINT_SG_NAME" --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "")
            fi

            if [[ -n "$VPC_ENDPOINT_SG_ID" && "$VPC_ENDPOINT_SG_ID" != "None" && "$VPC_ENDPOINT_SG_ID" != "" ]]; then
              echo "Found VPC endpoint SG: $VPC_ENDPOINT_SG_ID (importing into module.vpc.aws_security_group.vpc_endpoints)"
              tf_import_if_needed "module.vpc.aws_security_group.vpc_endpoints" "$VPC_ENDPOINT_SG_ID"
            else
              echo "No existing VPC endpoint SG found by name/tag; Terraform will create one if required."
            fi
          else
            echo "SSM VPC endpoints disabled. Skipping VPC endpoint security group import."
          fi

          K3S_EIP_ALLOC_ID=$(aws ec2 describe-addresses --region "$AWS_REGION" --filters "Name=tag:Name,Values=$K3S_EIP_NAME" --query "Addresses[0].AllocationId" --output text 2>/dev/null || true)
          tf_import_if_needed "module.ec2_k3s.aws_eip.k3s" "$K3S_EIP_ALLOC_ID"
          if [[ -n "$K3S_EIP_ALLOC_ID" && "$K3S_EIP_ALLOC_ID" != "None" ]]; then
            K3S_EIP_ASSOC_ID=$(aws ec2 describe-addresses --region "$AWS_REGION" --allocation-ids "$K3S_EIP_ALLOC_ID" --query "Addresses[0].AssociationId" --output text 2>/dev/null || true)
            tf_import_if_needed "module.ec2_k3s.aws_eip_association.k3s" "$K3S_EIP_ASSOC_ID"
          fi

          # WAF (only if exists)
          WAF_ID=$(aws wafv2 list-web-acls --scope REGIONAL --region "$AWS_REGION" --query "WebACLs[?Name=='$WAF_NAME'].Id | [0]" --output text 2>/dev/null || echo "")
          if [[ -n "$WAF_ID" && "$WAF_ID" != "None" ]]; then
            WAF_IMPORT_ID="${WAF_ID}/${WAF_NAME}/REGIONAL"
            tf_import_if_needed "module.waf.aws_wafv2_web_acl.portal" "$WAF_IMPORT_ID"
          else
            echo "WAF not found. Terraform will create it."
          fi

          # SSM endpoint management (document + State Manager associations)
          SSM_DOC_NAME="${NAME_PREFIX}-endpoint-baseline${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          SSM_BASELINE_ASSOC_NAME="${NAME_PREFIX}-endpoint-baseline${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"
          SSM_PATCH_ASSOC_NAME="${NAME_PREFIX}-patch-scan${RESOURCE_SUFFIX:+-$RESOURCE_SUFFIX}"

          if aws ssm describe-document --name "$SSM_DOC_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            tf_import_if_needed "module.ec2_k3s.aws_ssm_document.endpoint_baseline" "$SSM_DOC_NAME"
          else
            echo "SSM document $SSM_DOC_NAME not found. Terraform will create it."
          fi

          SSM_BASELINE_ASSOC_ID=$(aws ssm list-associations --region "$AWS_REGION" --association-filter-list "key=AssociationName,value=$SSM_BASELINE_ASSOC_NAME" --query 'Associations[0].AssociationId' --output text 2>/dev/null || echo "")
          if [[ -n "$SSM_BASELINE_ASSOC_ID" && "$SSM_BASELINE_ASSOC_ID" != "None" ]]; then
            tf_import_if_needed "module.ec2_k3s.aws_ssm_association.endpoint_baseline" "$SSM_BASELINE_ASSOC_ID"
          else
            echo "SSM baseline association not found. Terraform will create it."
          fi

          SSM_PATCH_ASSOC_ID=$(aws ssm list-associations --region "$AWS_REGION" --association-filter-list "key=AssociationName,value=$SSM_PATCH_ASSOC_NAME" --query 'Associations[0].AssociationId' --output text 2>/dev/null || echo "")
          if [[ -n "$SSM_PATCH_ASSOC_ID" && "$SSM_PATCH_ASSOC_ID" != "None" ]]; then
            tf_import_if_needed "module.ec2_k3s.aws_ssm_association.patch_scan" "$SSM_PATCH_ASSOC_ID"
          else
            echo "SSM patch-scan association not found. Terraform will create it."
          fi

          echo "Auto-import complete."

      - name: Terraform plan
        env:
          TF_VAR_resource_suffix: ""
          TF_VAR_db_password: "${{ secrets.CS3_DB_PASSWORD }}"
          TF_VAR_grafana_admin_password: "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          TF_VAR_use_default_vpc: "false"
          TF_VAR_enable_nat_gateway: "false"
          TF_VAR_enable_ssm_vpc_endpoints: "false"
          TF_VAR_create_k3s_instance: "true"
          TF_VAR_ec2_instance_type: "t2.small"
          TF_VAR_manage_cognito_domain: "true"
          TF_VAR_enable_logging: "false"
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        env:
          TF_VAR_resource_suffix: ""
          TF_VAR_db_password: "${{ secrets.CS3_DB_PASSWORD }}"
          TF_VAR_grafana_admin_password: "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          TF_VAR_use_default_vpc: "false"
          TF_VAR_enable_nat_gateway: "false"
          TF_VAR_enable_ssm_vpc_endpoints: "false"
          TF_VAR_create_k3s_instance: "true"
          TF_VAR_ec2_instance_type: "t2.small"
          TF_VAR_manage_cognito_domain: "true"
          TF_VAR_enable_logging: "false"
        run: terraform apply -auto-approve tfplan

      - name: Fetch k3s kubeconfig
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          mkdir -p .generated/k3s
          K3S_INSTANCE_ID=$(terraform output -raw ec2_instance_id)
          KUBECONFIG_PARAMETER_NAME=$(terraform output -raw kubeconfig_parameter_name)
          INSTANCE_LAUNCH_TIME=$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --instance-ids "$K3S_INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].LaunchTime' \
            --output text)
          INSTANCE_LAUNCH_EPOCH=$(date -d "$INSTANCE_LAUNCH_TIME" +%s)

          echo "Waiting for EC2 instance to report running state"
          aws ec2 wait instance-running --region "$AWS_REGION" --instance-ids "$K3S_INSTANCE_ID"

          echo "Waiting for SSM agent on $K3S_INSTANCE_ID"
          for i in $(seq 1 120); do
            PING_STATUS=$(aws ssm describe-instance-information --region "$AWS_REGION" --filters "Key=InstanceIds,Values=$K3S_INSTANCE_ID" --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null || true)
            if [[ "$PING_STATUS" == "Online" ]]; then
              break
            fi
            if [[ $((i % 6)) -eq 0 ]]; then
              echo "Still waiting for SSM: attempt $i/120, status=${PING_STATUS:-Unknown}"
            fi
            sleep 10
          done

          if [[ "$PING_STATUS" != "Online" ]]; then
            echo "ERROR: SSM agent never came online for $K3S_INSTANCE_ID"
            aws ec2 describe-instance-status --region "$AWS_REGION" --instance-ids "$K3S_INSTANCE_ID" --output table || true
            aws ec2 describe-instances --region "$AWS_REGION" --instance-ids "$K3S_INSTANCE_ID" --query 'Reservations[0].Instances[0].[State.Name,PublicIpAddress,PrivateIpAddress]' --output table || true
            aws ssm describe-instance-information --region "$AWS_REGION" --filters "Key=InstanceIds,Values=$K3S_INSTANCE_ID" --output table || true
            exit 1
          fi

          echo "Waiting for kubeconfig parameter $KUBECONFIG_PARAMETER_NAME"
          rm -f .generated/k3s/kubeconfig.yaml
          for i in $(seq 1 120); do
            if aws ssm get-parameter \
              --region "$AWS_REGION" \
              --name "$KUBECONFIG_PARAMETER_NAME" \
              --query 'Parameter.[LastModifiedDate,Value]' \
              --output json > /tmp/kubeconfig-parameter.json 2>/tmp/kubeconfig-parameter.err; then
              PARAM_MODIFIED=$(jq -r '.[0]' /tmp/kubeconfig-parameter.json)
              PARAM_MODIFIED_EPOCH=$(date -d "$PARAM_MODIFIED" +%s)

              if (( PARAM_MODIFIED_EPOCH < INSTANCE_LAUNCH_EPOCH )); then
                if [[ $((i % 12)) -eq 0 ]]; then
                  echo "Kubeconfig parameter exists but is stale: modified=$PARAM_MODIFIED, instance_launch=$INSTANCE_LAUNCH_TIME"
                fi
              else
                jq -r '.[1]' /tmp/kubeconfig-parameter.json > .generated/k3s/kubeconfig.yaml
              fi

              if [[ -s .generated/k3s/kubeconfig.yaml ]]; then
                echo "Fetched kubeconfig from Parameter Store"
                break
              fi
            fi
            if [[ $((i % 12)) -eq 0 ]]; then
              echo "Still waiting for kubeconfig parameter... (attempt $i/120)"
              cat /tmp/kubeconfig-parameter.err || true
            fi
            sleep 5
          done

          if [[ ! -s .generated/k3s/kubeconfig.yaml ]]; then
            echo "ERROR: kubeconfig parameter was not published by the instance"
            echo "---- EC2 status ----"
            aws ec2 describe-instance-status --region "$AWS_REGION" --instance-ids "$K3S_INSTANCE_ID" --output table || true
            echo "---- SSM managed instance status ----"
            aws ssm describe-instance-information --region "$AWS_REGION" --filters "Key=InstanceIds,Values=$K3S_INSTANCE_ID" --output table || true
            echo "---- Parameter lookup error ----"
            cat /tmp/kubeconfig-parameter.err || true
            exit 1
          fi

          if ! grep -q '^apiVersion: v1$' .generated/k3s/kubeconfig.yaml; then
            echo "ERROR: fetched kubeconfig does not look valid"
            sed -n '1,20p' .generated/k3s/kubeconfig.yaml
            exit 1
          fi

          if ! grep -q '^clusters:$' .generated/k3s/kubeconfig.yaml; then
            echo "ERROR: fetched kubeconfig is missing cluster definitions"
            sed -n '1,30p' .generated/k3s/kubeconfig.yaml
            exit 1
          fi

          K3S_PUBLIC_IP=$(terraform output -raw ec2_instance_public_ip)
          if [[ -n "$K3S_PUBLIC_IP" && "$K3S_PUBLIC_IP" != "null" ]]; then
            sed -i -E "s#server: https://[^:]+:6443#server: https://${K3S_PUBLIC_IP}:6443#g" .generated/k3s/kubeconfig.yaml
          fi

          echo "Fetched kubeconfig to .generated/k3s/kubeconfig.yaml"
          sed -n '1,12p' .generated/k3s/kubeconfig.yaml

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Verify kubeconfig is usable
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          kubectl --kubeconfig .generated/k3s/kubeconfig.yaml version --client=true >/dev/null

          K3S_INSTANCE_ID=$(terraform output -raw ec2_instance_id)
          K3S_PUBLIC_IP=$(terraform output -raw ec2_instance_public_ip)
          KUBECONFIG_PARAMETER_NAME=$(terraform output -raw kubeconfig_parameter_name)
          echo "Waiting for k3s API on ${K3S_PUBLIC_IP}:6443"

          for i in $(seq 1 120); do
            if kubectl --request-timeout=10s --kubeconfig .generated/k3s/kubeconfig.yaml get nodes 2>/tmp/kubectl-get-nodes.err; then
              echo "k3s kubeconfig verified"
              exit 0
            fi

            cat /tmp/kubectl-get-nodes.err || true
            if grep -qi 'certificate signed by unknown authority' /tmp/kubectl-get-nodes.err; then
              echo "ERROR: kubeconfig CA does not match the k3s API certificate."
              echo "This usually means Parameter Store still contains kubeconfig from an older EC2/k3s instance."
              echo "Delete $KUBECONFIG_PARAMETER_NAME or rerun after the current instance publishes a fresh kubeconfig."
              exit 1
            fi

            if [[ $((i % 12)) -eq 0 ]]; then
              echo "Still waiting for k3s API: attempt $i/120"
              aws ec2 describe-instance-status --region "$AWS_REGION" --instance-ids "$K3S_INSTANCE_ID" --output table || true
              aws ec2 describe-instances --region "$AWS_REGION" --instance-ids "$K3S_INSTANCE_ID" --query 'Reservations[0].Instances[0].[State.Name,PublicIpAddress,PrivateIpAddress]' --output table || true
            fi
            sleep 10
          done

          echo "ERROR: kubeconfig points to an API server that did not become reachable"
          echo "Kubeconfig server line:"
          grep 'server:' .generated/k3s/kubeconfig.yaml || true
          echo "EC2 status:"
          aws ec2 describe-instance-status --region "$AWS_REGION" --instance-ids "$K3S_INSTANCE_ID" --output table || true
          exit 1

      - name: Ensure monitoring stack
        env:
          GRAFANA_ADMIN_PASSWORD: "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          DB_PASSWORD: "${{ secrets.CS3_DB_PASSWORD }}"
        run: |
          set -euo pipefail
          export KUBECONFIG="$PWD/.generated/k3s/kubeconfig.yaml"
          DB_HOST="$(terraform output -raw ec2_instance_private_ip)"

          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

          # Remove any partially-created heavyweight chart release from older runs.
          helm --kubeconfig "$KUBECONFIG" -n monitoring uninstall prometheus >/dev/null 2>&1 || true

          kubectl -n monitoring create secret generic grafana-secrets \
            --from-literal=admin-password="${GRAFANA_ADMIN_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n monitoring create secret generic postgres-exporter \
            --from-literal=data-source-name="postgresql://postgres:${DB_PASSWORD}@${DB_HOST}:5432/employees?sslmode=disable" \
            --dry-run=client -o yaml | kubectl apply -f -

          cat > /tmp/cs3-monitoring.yaml <<'EOF'
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: prometheus
            namespace: monitoring
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: cs3-prometheus
          rules:
          - apiGroups: [""]
            resources: ["configmaps", "endpoints", "limitranges", "namespaces", "nodes", "nodes/proxy", "persistentvolumeclaims", "persistentvolumes", "pods", "replicationcontrollers", "resourcequotas", "secrets", "services"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["apps"]
            resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["autoscaling"]
            resources: ["horizontalpodautoscalers"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["batch"]
            resources: ["cronjobs", "jobs"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["policy"]
            resources: ["poddisruptionbudgets"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["storage.k8s.io"]
            resources: ["storageclasses", "volumeattachments"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["admissionregistration.k8s.io"]
            resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["extensions", "networking.k8s.io"]
            resources: ["ingresses", "networkpolicies"]
            verbs: ["get", "list", "watch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: cs3-prometheus
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cs3-prometheus
          subjects:
          - kind: ServiceAccount
            name: prometheus
            namespace: monitoring
          ---
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: prometheus-config
            namespace: monitoring
          data:
            prometheus.yml: |
              global:
                scrape_interval: 15s
              scrape_configs:
              - job_name: prometheus
                static_configs:
                - targets: ['localhost:9090']
              - job_name: node-exporter
                static_configs:
                - targets: ['node-exporter:9100']
              - job_name: kube-state-metrics
                static_configs:
                - targets: ['kube-state-metrics:8080']
              - job_name: postgres-exporter
                static_configs:
                - targets: ['postgres-exporter:9187']
              - job_name: kubernetes-nodes-cadvisor
                scheme: https
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                tls_config:
                  ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                kubernetes_sd_configs:
                - role: node
                relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - target_label: __address__
                  replacement: kubernetes.default.svc:443
                - source_labels: [__meta_kubernetes_node_name]
                  regex: (.+)
                  target_label: __metrics_path__
                  replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
              - job_name: kubernetes-pods
                kubernetes_sd_configs:
                - role: pod
                relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: true
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
          ---
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: node-exporter
            namespace: monitoring
          spec:
            selector:
              matchLabels:
                app: node-exporter
            template:
              metadata:
                labels:
                  app: node-exporter
              spec:
                hostPID: true
                hostNetwork: true
                containers:
                - name: node-exporter
                  image: quay.io/prometheus/node-exporter:v1.8.2
                  args:
                  - --path.procfs=/host/proc
                  - --path.sysfs=/host/sys
                  - --path.rootfs=/host/root
                  - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
                  ports:
                  - containerPort: 9100
                    hostPort: 9100
                  volumeMounts:
                  - name: proc
                    mountPath: /host/proc
                    readOnly: true
                  - name: sys
                    mountPath: /host/sys
                    readOnly: true
                  - name: root
                    mountPath: /host/root
                    readOnly: true
                  resources:
                    requests:
                      cpu: 20m
                      memory: 32Mi
                    limits:
                      cpu: 100m
                      memory: 128Mi
                volumes:
                - name: proc
                  hostPath:
                    path: /proc
                - name: sys
                  hostPath:
                    path: /sys
                - name: root
                  hostPath:
                    path: /
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: node-exporter
            namespace: monitoring
          spec:
            clusterIP: None
            selector:
              app: node-exporter
            ports:
            - name: metrics
              port: 9100
              targetPort: 9100
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: kube-state-metrics
            namespace: monitoring
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: kube-state-metrics
            template:
              metadata:
                labels:
                  app: kube-state-metrics
              spec:
                serviceAccountName: prometheus
                containers:
                - name: kube-state-metrics
                  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
                  ports:
                  - containerPort: 8080
                  resources:
                    requests:
                      cpu: 30m
                      memory: 64Mi
                    limits:
                      cpu: 150m
                      memory: 192Mi
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: kube-state-metrics
            namespace: monitoring
          spec:
            selector:
              app: kube-state-metrics
            ports:
            - name: metrics
              port: 8080
              targetPort: 8080
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgres-exporter
            namespace: monitoring
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: postgres-exporter
            template:
              metadata:
                labels:
                  app: postgres-exporter
              spec:
                containers:
                - name: postgres-exporter
                  image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
                  ports:
                  - containerPort: 9187
                  env:
                  - name: DATA_SOURCE_NAME
                    valueFrom:
                      secretKeyRef:
                        name: postgres-exporter
                        key: data-source-name
                  resources:
                    requests:
                      cpu: 20m
                      memory: 64Mi
                    limits:
                      cpu: 150m
                      memory: 192Mi
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres-exporter
            namespace: monitoring
          spec:
            selector:
              app: postgres-exporter
            ports:
            - name: metrics
              port: 9187
              targetPort: 9187
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: prometheus
            namespace: monitoring
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: prometheus
            template:
              metadata:
                labels:
                  app: prometheus
              spec:
                serviceAccountName: prometheus
                containers:
                - name: prometheus
                  image: prom/prometheus:v2.55.1
                  args:
                  - --config.file=/etc/prometheus/prometheus.yml
                  - --storage.tsdb.path=/prometheus
                  - --storage.tsdb.retention.time=2d
                  ports:
                  - containerPort: 9090
                  volumeMounts:
                  - name: config
                    mountPath: /etc/prometheus
                  - name: storage
                    mountPath: /prometheus
                  resources:
                    requests:
                      cpu: 50m
                      memory: 128Mi
                    limits:
                      cpu: 300m
                      memory: 512Mi
                volumes:
                - name: config
                  configMap:
                    name: prometheus-config
                - name: storage
                  emptyDir: {}
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: prometheus
            namespace: monitoring
          spec:
            selector:
              app: prometheus
            ports:
            - name: web
              port: 9090
              targetPort: 9090
          ---
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: grafana-datasources
            namespace: monitoring
          data:
            prometheus.yaml: |
              apiVersion: 1
              datasources:
              - name: Prometheus
                type: prometheus
                access: proxy
                url: http://prometheus:9090
                isDefault: true
          ---
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: grafana-dashboard-provider
            namespace: monitoring
          data:
            dashboards.yaml: |
              apiVersion: 1
              providers:
              - name: CS3
                orgId: 1
                folder: CS3
                type: file
                disableDeletion: false
                updateIntervalSeconds: 30
                options:
                  path: /etc/grafana/dashboards
          ---
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: grafana-cs3-dashboard
            namespace: monitoring
          data:
            cs3-overview.json: |
              {
                "uid": "cs3-overview",
                "title": "CS3 k3s Portal Overview",
                "schemaVersion": 39,
                "version": 1,
                "refresh": "15s",
                "time": {"from": "now-30m", "to": "now"},
                "panels": [
                  {"type":"stat","title":"Portal Up","gridPos":{"x":0,"y":0,"w":6,"h":4},"targets":[{"expr":"cs3_portal_info","refId":"A"}]},
                  {"type":"stat","title":"Portal DB Up","gridPos":{"x":6,"y":0,"w":6,"h":4},"targets":[{"expr":"cs3_portal_database_up","refId":"A"}]},
                  {"type":"stat","title":"PostgreSQL Up","gridPos":{"x":12,"y":0,"w":6,"h":4},"targets":[{"expr":"pg_up","refId":"A"}]},
                  {"type":"stat","title":"Running Pods","gridPos":{"x":18,"y":0,"w":6,"h":4},"targets":[{"expr":"sum(kube_pod_status_phase{phase=\"Running\"})","refId":"A"}]},
                  {"type":"timeseries","title":"Node CPU Usage","gridPos":{"x":0,"y":4,"w":12,"h":8},"targets":[{"expr":"100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)","legendFormat":"{{instance}} CPU %","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent"}}},
                  {"type":"timeseries","title":"Node Memory Usage","gridPos":{"x":12,"y":4,"w":12,"h":8},"targets":[{"expr":"100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))","legendFormat":"{{instance}} memory %","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent"}}},
                  {"type":"timeseries","title":"Filesystem Usage","gridPos":{"x":0,"y":12,"w":12,"h":8},"targets":[{"expr":"100 * (1 - (node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|overlay\"}))","legendFormat":"{{mountpoint}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent"}}},
                  {"type":"timeseries","title":"Portal API Requests","gridPos":{"x":12,"y":12,"w":12,"h":8},"targets":[{"expr":"sum by (route,status) (rate(cs3_portal_http_requests_total[5m]))","legendFormat":"{{route}} {{status}}","refId":"A"}]},
                  {"type":"timeseries","title":"Portal API Latency Avg","gridPos":{"x":0,"y":20,"w":12,"h":8},"targets":[{"expr":"sum by (route) (rate(cs3_portal_request_latency_seconds_sum[5m])) / sum by (route) (rate(cs3_portal_request_latency_seconds_count[5m]))","legendFormat":"{{route}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"s"}}},
                  {"type":"timeseries","title":"PostgreSQL Connections","gridPos":{"x":12,"y":20,"w":12,"h":8},"targets":[{"expr":"sum(pg_stat_activity_count)","legendFormat":"connections","refId":"A"}]},
                  {"type":"timeseries","title":"Kubernetes Deployment Availability","gridPos":{"x":0,"y":28,"w":12,"h":8},"targets":[{"expr":"kube_deployment_status_replicas_available","legendFormat":"{{namespace}}/{{deployment}}","refId":"A"}]},
                  {"type":"stat","title":"Portal Employees","gridPos":{"x":12,"y":28,"w":6,"h":4},"targets":[{"expr":"cs3_portal_employees_total","refId":"A"}]},
                  {"type":"stat","title":"Pending Requests","gridPos":{"x":18,"y":28,"w":6,"h":4},"targets":[{"expr":"cs3_portal_pending_requests_total","refId":"A"}]},
                  {"type":"timeseries","title":"Node Load Average","gridPos":{"x":0,"y":36,"w":8,"h":7},"targets":[{"expr":"node_load1","legendFormat":"1m","refId":"A"},{"expr":"node_load5","legendFormat":"5m","refId":"B"},{"expr":"node_load15","legendFormat":"15m","refId":"C"}]},
                  {"type":"timeseries","title":"Node Disk IO","gridPos":{"x":8,"y":36,"w":8,"h":7},"targets":[{"expr":"sum by (device) (rate(node_disk_read_bytes_total[5m]))","legendFormat":"{{device}} read","refId":"A"},{"expr":"sum by (device) (rate(node_disk_written_bytes_total[5m]))","legendFormat":"{{device}} write","refId":"B"}],"fieldConfig":{"defaults":{"unit":"Bps"}}},
                  {"type":"timeseries","title":"Node Network Traffic","gridPos":{"x":16,"y":36,"w":8,"h":7},"targets":[{"expr":"sum by (device) (rate(node_network_receive_bytes_total{device!=\"lo\"}[5m]))","legendFormat":"{{device}} rx","refId":"A"},{"expr":"sum by (device) (rate(node_network_transmit_bytes_total{device!=\"lo\"}[5m]))","legendFormat":"{{device}} tx","refId":"B"}],"fieldConfig":{"defaults":{"unit":"Bps"}}},
                  {"type":"timeseries","title":"Kubernetes Pod Restarts","gridPos":{"x":0,"y":43,"w":12,"h":7},"targets":[{"expr":"sum by (namespace,pod) (increase(kube_pod_container_status_restarts_total[30m]))","legendFormat":"{{namespace}}/{{pod}}","refId":"A"}]},
                  {"type":"timeseries","title":"Portal CPU and Memory","gridPos":{"x":12,"y":43,"w":12,"h":7},"targets":[{"expr":"sum(rate(container_cpu_usage_seconds_total{namespace=\"cs3-prod\",pod=~\"cs3-portal.*\",container!=\"\"}[5m]))","legendFormat":"CPU cores","refId":"A"},{"expr":"sum(container_memory_working_set_bytes{namespace=\"cs3-prod\",pod=~\"cs3-portal.*\",container!=\"\"})","legendFormat":"memory","refId":"B"}]}
                ]
              }
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: grafana
            namespace: monitoring
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: grafana
            template:
              metadata:
                labels:
                  app: grafana
              spec:
                containers:
                - name: grafana
                  image: grafana/grafana:11.3.0
                  ports:
                  - containerPort: 3000
                  env:
                  - name: GF_SECURITY_ADMIN_USER
                    value: admin
                  - name: GF_SECURITY_ADMIN_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: grafana-secrets
                        key: admin-password
                  volumeMounts:
                  - name: datasources
                    mountPath: /etc/grafana/provisioning/datasources
                  - name: dashboard-provider
                    mountPath: /etc/grafana/provisioning/dashboards
                  - name: dashboards
                    mountPath: /etc/grafana/dashboards
                  - name: storage
                    mountPath: /var/lib/grafana
                  resources:
                    requests:
                      cpu: 50m
                      memory: 128Mi
                    limits:
                      cpu: 300m
                      memory: 512Mi
                volumes:
                - name: datasources
                  configMap:
                    name: grafana-datasources
                - name: dashboard-provider
                  configMap:
                    name: grafana-dashboard-provider
                - name: dashboards
                  configMap:
                    name: grafana-cs3-dashboard
                - name: storage
                  emptyDir: {}
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: grafana
            namespace: monitoring
          spec:
            type: NodePort
            selector:
              app: grafana
            ports:
            - name: web
              port: 3000
              targetPort: 3000
              nodePort: 30100
          EOF

          kubectl apply -f /tmp/cs3-monitoring.yaml
          kubectl -n monitoring rollout status daemonset/node-exporter --timeout=180s
          kubectl -n monitoring rollout status deployment/kube-state-metrics --timeout=180s
          kubectl -n monitoring rollout status deployment/postgres-exporter --timeout=180s
          kubectl -n monitoring rollout status deployment/prometheus --timeout=180s
          kubectl -n monitoring rollout status deployment/grafana --timeout=180s

          kubectl -n monitoring get pods,svc
          kubectl -n monitoring get svc grafana -o wide

      - name: Import existing logging namespace
        if: ${{ vars.CS3_ENABLE_LOKI == 'true' }}
        env:
          TF_VAR_resource_suffix: ""
          TF_VAR_db_password: "${{ secrets.CS3_DB_PASSWORD }}"
          TF_VAR_grafana_admin_password: "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          TF_VAR_use_default_vpc: "false"
          TF_VAR_enable_nat_gateway: "false"
          TF_VAR_enable_ssm_vpc_endpoints: "false"
          TF_VAR_create_k3s_instance: "true"
          TF_VAR_ec2_instance_type: "t2.small"
          TF_VAR_manage_cognito_domain: "true"
          TF_VAR_enable_logging: "true"
          TF_VAR_kubeconfig_path: ".generated/k3s/kubeconfig.yaml"
        run: |
          set -euo pipefail
          LOGGING_NAMESPACE="logging"

          import_if_missing() {
            local address="$1"
            local import_id="$2"

            if terraform state show "$address" >/dev/null 2>&1; then
              echo "Rebinding Terraform state for $address"
              terraform state rm "$address" >/dev/null 2>&1 || true
            fi

            echo "Importing existing resource: $address => $import_id"
            terraform import -input=false "$address" "$import_id" || true
          }

          if kubectl --kubeconfig .generated/k3s/kubeconfig.yaml get namespace "$LOGGING_NAMESPACE" >/dev/null 2>&1; then
            import_if_missing 'module.logging[0].kubernetes_namespace.logging' "$LOGGING_NAMESPACE"
          else
            echo "Logging namespace not present. Terraform will create it."
          fi

          if kubectl --kubeconfig .generated/k3s/kubeconfig.yaml -n "$LOGGING_NAMESPACE" get configmap fluent-bit-config >/dev/null 2>&1; then
            import_if_missing 'module.logging[0].kubernetes_config_map.fluent_bit_config' "$LOGGING_NAMESPACE/fluent-bit-config"
          else
            echo "fluent-bit-config ConfigMap not present. Terraform will create it."
          fi

          if helm --kubeconfig .generated/k3s/kubeconfig.yaml -n "$LOGGING_NAMESPACE" status loki >/dev/null 2>&1; then
            import_if_missing 'module.logging[0].helm_release.loki' "$LOGGING_NAMESPACE/loki"
          else
            echo "loki Helm release not present. Terraform will install it."
          fi

      - name: Terraform apply logging stack
        if: ${{ vars.CS3_ENABLE_LOKI == 'true' }}
        env:
          TF_VAR_resource_suffix: ""
          TF_VAR_db_password: "${{ secrets.CS3_DB_PASSWORD }}"
          TF_VAR_grafana_admin_password: "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          TF_VAR_use_default_vpc: "false"
          TF_VAR_enable_nat_gateway: "false"
          TF_VAR_enable_ssm_vpc_endpoints: "false"
          TF_VAR_create_k3s_instance: "true"
          TF_VAR_ec2_instance_type: "t2.small"
          TF_VAR_manage_cognito_domain: "true"
          TF_VAR_enable_logging: "true"
          TF_VAR_kubeconfig_path: ".generated/k3s/kubeconfig.yaml"
        run: terraform apply -auto-approve

      - name: Register Cognito hosted-UI callback URLs
        working-directory: cs3
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          USER_POOL_ID="$(terraform -chdir=terraform output -raw cognito_user_pool_id)"
          CLIENT_ID="$(terraform -chdir=terraform output -raw cognito_client_id)"
          PORTAL_IP="$(terraform -chdir=terraform output -raw ec2_instance_public_ip)"
          # HTTPS: Cognito rejects non-localhost http callbacks. The ingress serves
          # TLS (self-signed) on 443, so the portal is reachable at https://<EIP>.
          PORTAL_URL="https://${PORTAL_IP}"

          # The portal's redirect_uri is ${PORTAL_URL}/callback and its logout_uri is
          # ${PORTAL_URL}. The EIP is unknown at plan time and Terraform ignores
          # callback/logout changes, so we register them here post-apply. Fetch the
          # current client name so update-user-pool-client doesn't reset it.
          CLIENT_NAME="$(aws cognito-idp describe-user-pool-client --region "$AWS_REGION" \
            --user-pool-id "$USER_POOL_ID" --client-id "$CLIENT_ID" \
            --query 'UserPoolClient.ClientName' --output text)"

          echo "Pointing Cognito app client ($CLIENT_NAME) callbacks at ${PORTAL_URL}"
          aws cognito-idp update-user-pool-client \
            --region "$AWS_REGION" \
            --user-pool-id "$USER_POOL_ID" \
            --client-id "$CLIENT_ID" \
            --client-name "$CLIENT_NAME" \
            --explicit-auth-flows ALLOW_USER_PASSWORD_AUTH ALLOW_REFRESH_TOKEN_AUTH ALLOW_ADMIN_USER_PASSWORD_AUTH \
            --supported-identity-providers COGNITO \
            --allowed-o-auth-flows code implicit \
            --allowed-o-auth-scopes phone email openid profile \
            --allowed-o-auth-flows-user-pool-client \
            --callback-urls "${PORTAL_URL}/callback" \
            --logout-urls "${PORTAL_URL}" \
            --output text >/dev/null
          echo "Callback registered: ${PORTAL_URL}/callback ; logout: ${PORTAL_URL}"

      - name: Build and push portal image
        working-directory: cs3
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA::12}"
          ECR_REPO="$(terraform -chdir=terraform output -raw ecr_repository_url)"
          ECR_REGISTRY="${ECR_REPO%/*}"

          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
          docker build -t "cs3-portal:${IMAGE_TAG}" portal
          docker tag "cs3-portal:${IMAGE_TAG}" "${ECR_REPO}:${IMAGE_TAG}"
          docker tag "cs3-portal:${IMAGE_TAG}" "${ECR_REPO}:latest"
          docker push "${ECR_REPO}:${IMAGE_TAG}"
          docker push "${ECR_REPO}:latest"

          echo "PORTAL_IMAGE=${ECR_REPO}:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Deploy portal to k3s
        working-directory: cs3
        env:
          DB_PASSWORD: "${{ secrets.CS3_DB_PASSWORD }}"
        run: |
          set -euo pipefail
          export KUBECONFIG="$GITHUB_WORKSPACE/cs3/terraform/.generated/k3s/kubeconfig.yaml"

          CLIENT_ID="$(terraform -chdir=terraform output -raw cognito_client_id)"
          CLIENT_SECRET="$(terraform -chdir=terraform output -raw cognito_client_secret)"
          COGNITO_DOMAIN="$(terraform -chdir=terraform output -raw cognito_domain 2>/dev/null || true)"
          DB_HOST="$(terraform -chdir=terraform output -raw ec2_instance_private_ip)"
          PORTAL_IP="$(terraform -chdir=terraform output -raw ec2_instance_public_ip)"
          USER_POOL_ID="$(terraform -chdir=terraform output -raw cognito_user_pool_id)"

          if [[ -z "$COGNITO_DOMAIN" || "$COGNITO_DOMAIN" == "null" ]]; then
            COGNITO_DOMAIN="disabled"
          fi

          bash ./scripts/deploy-portal.sh \
            "$PORTAL_IMAGE" \
            "$CLIENT_ID" \
            "$CLIENT_SECRET" \
            "$COGNITO_DOMAIN" \
            "$DB_HOST" \
            "$DB_PASSWORD" \
            "https://${PORTAL_IP}" \
            "$USER_POOL_ID"

          kubectl get pods,svc,ingress -n cs3-prod
          # Health check over HTTP/80 (still served via the 'web' entrypoint) so
          # deploy success doesn't depend on the self-signed TLS path. Retries +
          # bounded connect timeout so a brief ingress/pod warmup doesn't hard-fail.
          curl -fsS --connect-timeout 10 --retry 10 --retry-delay 6 --retry-all-errors \
            "http://${PORTAL_IP}/api/health"

      - name: Output Terraform values
        run: |
          echo "=== Deployment Outputs ===" 
          terraform output -json > /tmp/outputs.json
          cat /tmp/outputs.json

  database-init:
    name: Initialize Employee Database
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: apply
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-cs3-db-init
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Get EC2 instance ID
        working-directory: cs3/terraform
        run: |
          terraform init -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
                        -backend-config="key=cs3/terraform.tfstate" \
                        -backend-config="region=${{ env.AWS_REGION }}" \
                        -backend-config="encrypt=true" \
                        -backend-config="dynamodb_table=terraform-locks"
          INSTANCE_ID=$(terraform output -raw ec2_instance_id 2>/dev/null || true)
          if [[ -n "$INSTANCE_ID" && "$INSTANCE_ID" != "null" ]]; then
            echo "EC2_INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          else
            echo "No EC2 instance found. Skipping DB init."
          fi

      - name: Initialize database schema via SSM
        if: env.AUTO_DB_INIT == 'true' && env.EC2_INSTANCE_ID != ''
        env:
          DB_PASSWORD: "${{ secrets.CS3_DB_PASSWORD }}"
        run: |
          # PostgreSQL is on EC2 (localhost). Connect via SSM — no public port needed.
          SCHEMA_B64=$(base64 -w0 cs3/terraform/rds/schema.sql)

          PARAMS=$(jq -n \
            --arg schema "$SCHEMA_B64" \
            --arg pass   "$DB_PASSWORD" \
            '{"commands": ["echo \($schema) | base64 -d | PGPASSWORD=\($pass) psql -U postgres -d employees -v ON_ERROR_STOP=1 && echo DB_INIT_OK"]}')

          COMMAND_ID=$(aws ssm send-command \
            --region        "$AWS_REGION" \
            --instance-ids  "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters    "$PARAMS" \
            --query         "Command.CommandId" \
            --output        text)

          echo "SSM command: $COMMAND_ID — waiting for completion..."
          aws ssm wait command-executed \
            --region     "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID"

          aws ssm get-command-invocation \
            --region      "$AWS_REGION" \
            --command-id  "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query       '[StandardOutputContent, StandardErrorContent]' \
            --output      text
